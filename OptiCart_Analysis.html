st:** password reset dead-ends [W5]; refunds are status-only, no money movement [W13]; `/admin/profile` stub; mega-menu category links return empty lists.\n**Improve:** (1) finish reset-password (validator already exists); (2) real Stripe refund + `refund_decision` audit; (3) wire the mega-menu.\n\n## 9. Documentation Quality ‚Äî 6.5/10\n\n**Evidence for:** the v4 database spec is genuinely strong ‚Äî per-collection rationale, index strategy, scaling controls, aggregation sketches (git HEAD); README covers quick start, seed data, test credentials/coupons, Stripe modes, cron behavior, env vars; high-value inline comments at the hard parts (auth rotation, single-flight, CORS).\n**Evidence against:** README drift ‚Äî names a `CartContext` that doesn't exist (real: `ShopContext`), says React Router v6 (installed v7), points to a nonexistent `server/.env.example`; the two DB-spec files are **deleted in the working tree** (only recoverable via git); no API reference beyond a 14-row table; no CONTRIBUTING/architecture doc; JWT_SECRET/JWT_REFRESH_SECRET listed in README env block are never read by code (only `JWT_ACCESS_SECRET` is ‚Äî `utils/tokens.ts:4`).\n**Improve:** (1) restore the DB docs into the repo (e.g. `docs/`) and update to v5; (2) fix README drift + add `.env.example`; (3) generate an endpoint reference (even a hand-written table per router).\n*Presentation note: this drift is literally the theme of the talk ‚Äî use it.*\n\n## 10. Git Usage ‚Äî 5/10\n\n**Evidence (read-only `git log --oneline --all`, `git branch -a`):** 19 commits, 2 branches (`main`, `origin/test` ‚Äî test is 4 commits ahead with substantive work incl. one exemplary long-form feat commit `b9d48b3`); two authors (Mahmoud Sidawi 12, malik-halimeh 8) ‚Äî **no commits from a third account**, so Haya's work is invisible in history; message quality is bimodal: good conventional commits (`ab31544 feat: implement full authentication‚Ä¶`, `21cb44d chore: stop tracking node_modules‚Ä¶`) next to `hi`, `hi`, `small fix`, and typo-laden ones (`116d117 \"fix same of the search‚Ä¶gaving json I trun it\"`); history shows a `.env` leak + cleanup cycle (`ba03320`, `64c6488`) and a dist-tracking revert cycle (`eacc20e`‚Üí`5d1795b`); stray artifacts committed (`client/a.json`); unmerged divergence between `main` and `test`.\n**Improve:** (1) adopt conventional-commit discipline (b9d48b3 proves the team can); (2) all three members commit under their own accounts; (3) merge or rebase `test` into `main` before the presentation and delete stray files.\n\n## 11. Clean & Maintainable Code ‚Äî 7/10\n\n**Evidence for:** TypeScript interfaces exported beside every schema; validators separated from controllers; UI primitives reused everywhere; naming is descriptive (`prevRefreshTokenExpiresAt`, `checkAndTriggerLowStock`).\n**Evidence against:** several 500+ line files doing multiple jobs (`Products.tsx` 683, `ProductDetail.tsx` 633, `StorefrontLayout.tsx` 606, `controllers/order.ts` 508); page-level fetch logic re-implemented per page (no shared data-fetch hook); dead code (`ResetPasswordValidator`, `refund_decision`, `ui/SearchBox.tsx` appears unused by pages).\n**Improve:** (1) split the 600-line components (e.g. mega-menu ‚Üí own component); (2) a `useFetch`/query hook to kill the copy-pasted loading/error state; (3) remove dead code or finish the features it anticipated.\n\n## 12. Scalability & Production Readiness ‚Äî 6/10\n\n**Evidence for:** connection pooling + retry/fail-fast (`config/db.ts`); pagination capped at 100 everywhere; TTL keeps the highest-write collection bounded; recommendation work precomputed off the request path; stateless access tokens allow horizontal API scaling; integer-cents money.\n**Evidence against:** in-memory rate-limit store and in-process cron both break at >1 instance; morgan `dev` logging and `console.log` everywhere (no structured logger, no log levels); no health-check beyond a static 200 (`server.ts:39-41` doesn't check the DB); no Docker/CI/CD config anywhere in the repo; mock modes (Stripe/Cloudinary/mail) selected implicitly by env-var absence ‚Äî a misconfigured prod deploy silently runs mocks; webhook W1.\n**Improve:** (1) Redis-backed rate limits + extract the cron to a scheduled task; (2) structured logging (pino) + a DB-aware health check; (3) explicit `NODE_ENV=production` guards that refuse to boot with mock keys.\n\n---\n\n## Score Summary\n\n| Criterion | Score |\n|---|---|\n| Code quality | 7.5 |\n| Project structure | 7 |\n| UI/UX quality | 7.5 |\n| Backend architecture | 8.5 |\n| Database design | 8.5 |\n| Security practices | 7.5 |\n| Responsiveness | 8 |\n| Functionality completeness | 8 |\n| Documentation quality | 6.5 |\n| Git usage | 5 |\n| Clean & maintainable code | 7 |\n| Scalability & production readiness | 6 |\n| **Mean** | **7.25** |\n\nStrongest story to tell: backend architecture + database design (both documented *and* implemented). Weakest flank an instructor will probe: git hygiene and doc drift ‚Äî own them proactively; they are fixable before the presentation (merge `test`, restore docs, delete strays) without touching feature code.\n"},{"id":"mapping","icon":"üéØ","title":"Evaluation Mapping","md":"# OptiCart ‚Äî Evaluation Mapping\n\n> Criterion ‚Üí concrete evidence (file paths) ‚Üí presenter ‚Üí where it appears in the presentation.\n> \"Slide\" numbers are placeholders (S-x) to be bound when the deck exists; \"Demo\" = live demo moment.\n\n| Criterion | Concrete evidence in OptiCart | Presenter | Where it appears |\n|---|---|---|---|\n| **Code quality** | Uniform controller pattern + AppError envelope (`server/src/middleware/error.ts`, any controller); intent comments at hard spots (`controllers/auth.ts:306-309`, `client/src/services/api.ts:34-38`); shared utils (`utils/escapeRegex.ts`) | Malik | S-Architecture; code walkthrough of one controller during backend demo |\n| **Project structure** | Monorepo workspaces (`package.json:5-8`); backend layering `config/middleware/models/routes/controllers/services/utils/validators`; frontend `pages/components/context/services/utils` | Malik | S-Repo-Tour (annotated tree slide, from REPO_MAP.md) |\n| **UI/UX quality** | Design tokens (`client/tailwind.config.js`); 17 ui components incl. `DataTable.tsx`, `Skeleton.tsx`, `Toast.tsx`; debounced live search w/ highlight (`components/layout/StorefrontLayout.tsx:127-176`); duplicate-aware cart toasts (`pages/ProductList.tsx:162-189`) | Haya | Demo: browse ‚Üí search suggestions ‚Üí add to cart ‚Üí toast; S-DesignSystem |\n| **Backend architecture** | Middleware chain (`server/src/server.ts:20-45`); request lifecycle; two-phase payment‚Üístaff-confirm design (`controllers/order.ts:211-214`); non-blocking side effects (`order.ts:516-574`) | Malik | S-RequestLifecycle diagram; Demo: order placed ‚Üí stays pending ‚Üí staff confirms |\n| **Database design** | v4 spec (git HEAD `OptiCart_Database_Structure_v4_full.md`); order snapshots w/ `unitCostCents` (`models/Order.ts:61-90`); unique review index (`models/Review.ts:81`); TTL events (`models/ProductEvent.ts:44`); append-only audit hooks (`models/AuditLog.ts:78-94`) | Mahmod | S-ERD + S-EmbedVsReference; Demo: show an order document vs its mutated product |\n| **Security practices** | Refresh rotation + reuse detection (`controllers/auth.ts:309-391`); in-memory access token (`services/api.ts:6-11`); RBAC (`middleware/auth.ts:41-53`); rate limiters (`middleware/rateLimiter.ts`); Zod allowlist (`validators/user.ts:34-60`) | Malik | S-AuthFlow animated diagram; Demo: token reuse ‚Üí `AUTH_SESSION_COMPROMISED`; Q&A ammo from SECURITY_REVIEW ¬ßB |\n| **Responsiveness** | Mobile drawers storefront + admin (`StorefrontLayout.tsx:480-597`, `AdminLayout.tsx:210-219`); breakpoint grids (`ProductList.tsx:368`, `admin/Dashboard.tsx:134`); mobile filter panel (`ProductList.tsx:408-425`) | Haya | Demo: devtools device toggle live resize during storefront tour |\n| **Functionality completeness** | 20+ end-to-end features (FEATURE_INVENTORY.md ¬ß1‚Äì21): guest‚Üíauth merge, checkout w/ Stripe mock, fulfilment state machine, verified reviews, coupons, low-stock, analytics, notifications, recommendations | All three | The main demo storyline: guest browse ‚Üí register+verify ‚Üí buy ‚Üí staff fulfil ‚Üí review |\n| **Documentation quality** | v4 DB spec depth; README (credentials, seed, Stripe modes); inline rationale comments ‚Äî plus honestly-owned drift (CartContext/ShopContext, RR v6/v7, missing `.env.example`) | Mahmod | S-Docs; ties into the talk's documentation theme ‚Äî show the drift on screen deliberately |\n| **Git usage** | 19 commits / 2 branches / 2 authors (`git log --oneline --all`); exemplary long-form commit `b9d48b3` vs `hi` commits; `.env` leak-and-cleanup story (`ba03320`‚Üí`64c6488`) | Malik | S-GitStory (honest before/after slide); improvement plan stated proactively |\n| **Clean & maintainable code** | Typed schemas + exported interfaces (every model); validators separated (`server/src/validators/`); reusable ui kit; named constants (`ROTATION_GRACE_MS`) | Haya (frontend) + Malik (backend) | Woven into both code walkthroughs |\n| **Scalability & production readiness** | Pooling+retry (`config/db.ts`); pagination caps; TTL-bounded events; precomputed recommendation cache (`services/scheduler.ts`); stateless access tokens ‚Äî with stated limits (in-process cron, in-memory rate store) | Malik | S-Scale (\"what breaks at 10√ó and what we'd change\") ‚Äî sourced from PROJECT_AUDIT ¬ß12 |\n| **Planning phase** (if graded) | Requirements/roles/ERD/sprints reconstruction (PLANNING_PHASE.md); BRD-referencing v4 spec as pre-dev artifact | Mahmod | S-Planning at the start of the deck |\n| **Future work** (if graded) | Smart Energy Advisor (FUTURE_FEATURE.md) ‚Äî schema fields verified against `models/Product.ts`, filter hook verified against `controllers/product.ts:42-134` | All (Haya UI, Mahmod schema, Malik pipeline) | Closing slides ‚Äî S-Future |\n\n## Suggested demo-moment ordering (single narrative)\n\n1. **Guest** browses catalog, live search, adds to cart (Haya) ‚Äî UI/UX + responsiveness.\n2. **Register ‚Üí email code ‚Üí session** (Malik) ‚Äî auth + security; show the rotation diagram while the code email \"arrives\".\n3. **Checkout** with mock Stripe; order appears **pending** (Malik) ‚Äî backend architecture.\n4. **Staff confirms ‚Üí ships ‚Üí delivers** in admin queue; customer bell + email fire (Haya drives UI, Malik narrates state machine).\n5. **Verified review** now unlockable on the delivered product (Mahmod: unique index + transaction story).\n6. **Admin analytics + audit trail** (Mahmod: append-only proof ‚Äî try to edit a log in the shell, watch it throw).\n7. **Honesty segment:** known issues (mega-menu links, reset-password dead end, webhook raw-body) + improvement plan (Malik) ‚Äî instructors reward this.\n8. **Smart Energy Advisor** future feature (all).\n"},{"id":"planning","icon":"üìÖ","title":"Planning Phase","md":"# OptiCart ‚Äî Planning-Phase Reconstruction\n\n> Purpose: the planning-phase material the instructor requires, reconstructed from verifiable artifacts.\n> **Honesty note on sources:** the requested `OptiCart_Jira_Import*.csv` files are **[NOT FOUND]** ‚Äî absent from the working tree and from the entire git history (verified with `git log --all --name-only --diff-filter=A -- '*Jira*' '*.csv'`, zero results). The sprint plan below is therefore **reconstructed from git history and the versioned design docs**, and is labeled as such ‚Äî do not present it as an exported Jira board. Everything else derives from implemented code and the pre-development spec `OptiCart_Database_Structure_v4_full.md` (exists at git HEAD; references a \"OptiCart_BRD_v1.0\" that is not in the repo).\n\n---\n\n## 1. Functional Requirements (derived from implemented features)\n\n**FR-1 Accounts & Access**\n- FR-1.1 Register with email + password (‚â•8 chars, 1 uppercase, 1 digit ‚Äî `validators/auth.ts:4-16`); account unusable until a 6-digit emailed code is confirmed (`controllers/auth.ts:104-125`).\n- FR-1.2 Login/logout with persistent 7-day sessions surviving page reloads (refresh cookie + silent refresh).\n- FR-1.3 Google sign-in with automatic account provisioning (`controllers/auth.ts:196-257`).\n- FR-1.4 Profile: name + multi-address book with a single default (`controllers/auth.ts:488-551`).\n- FR-1.5 Password recovery request (anti-enumeration). *(Completion of the reset itself is a known gap ‚Äî FEATURE_INVENTORY ¬ß1.)*\n\n**FR-2 Catalog**\n- FR-2.1 Browse products with variant-level price/stock (embedded variants ‚Äî `models/Product.ts:8-19`).\n- FR-2.2 Filter by category (2-level tree incl. children), price range, minimum rating; 4 sort orders; text search; pagination (`controllers/product.ts:42-134`).\n- FR-2.3 Product detail with gallery, per-variant photos, reviews, recommendations.\n- FR-2.4 Sold-out products hidden from the storefront (`inStock=1` filter) but visible to staff.\n\n**FR-3 Shopping**\n- FR-3.1 Guest cart & wishlist in localStorage; merged into the account on sign-in with `max(quantity)` conflict resolution capped by stock (`controllers/cart.ts:266-337`).\n- FR-3.2 Cart revalidated live: deleted products dropped, price-change and stock warnings surfaced (`controllers/cart.ts:24-74`).\n- FR-3.3 Coupons: percentage/fixed, expiry, min-order, global + per-user limits (`controllers/coupon.ts:9-86`).\n\n**FR-4 Checkout & Orders**\n- FR-4.1 Stripe payment (PaymentIntent + webhook), with a keyless mock mode for demos.\n- FR-4.2 Orders snapshot items (name/price/cost) at purchase time (`models/Order.ts:61-90`).\n- FR-4.3 Two-phase fulfilment: payment captures funds; staff explicitly confirm; state machine `confirmed‚Üíprocessing‚Üíshipped‚Üídelivered`, any‚Üí`cancelled|refunded`, terminal lock, reason required for cancel/refund (`controllers/order.ts:458-583`).\n- FR-4.4 Customers see their history and an order timeline; can leave one order-experience feedback after confirmation.\n\n**FR-5 Reviews**\n- FR-5.1 Verified purchase only (delivered order containing the product ‚Äî `controllers/review.ts:104-116`); one review per user per product (unique index); 30-day edit window; staff soft-remove with audit.\n\n**FR-6 Inventory Operations (staff)**\n- FR-6.1 Product/category/coupon CRUD with guards (delete blocked in active orders / with children).\n- FR-6.2 Low-stock alerts auto-raised at variant threshold (default 10), one active per variant, resolvable, emailed to all managers.\n- FR-6.3 Fulfilment queue with status filter and order-number search.\n\n**FR-7 Governance (super admin)**\n- FR-7.1 User management: create/edit, role change, activate/deactivate, delete ‚Äî self-change blocked, all audited.\n- FR-7.2 Append-only audit trail with actor/type/target/date filtering.\n- FR-7.3 Analytics: revenue (delivered), top SKUs, order volume, customer growth, 7‚Äì365-day windows.\n\n**FR-8 Engagement**\n- FR-8.1 In-app notifications on every order status change.\n- FR-8.2 Transactional emails (verification, confirmation, status, low-stock).\n- FR-8.3 Nightly-computed \"customers also bought\" recommendations + trending/most-selling flags.\n\n## 2. Non-Functional Requirements (derived from code)\n\n| NFR | Requirement | Implementation evidence |\n|---|---|---|\n| NFR-1 Security | Hashed credentials, revocable sessions, theft detection, RBAC, rate limiting, input validation | SECURITY_REVIEW ¬ßA |\n| NFR-2 Integrity | Money as integer cents; order snapshots immutable; audit log append-only | `models/Order.ts`, `models/AuditLog.ts:78-94` |\n| NFR-3 Performance | Read-path indexes (text, compound); recommendation work precomputed off-request; pagination ‚â§100 | `models/Product.ts:110-111`; `services/scheduler.ts` |\n| NFR-4 Resilience | DB retry/reconnect with fail-fast exit; side effects (mail/audit/notify) never fail the request | `config/db.ts:37-52`; `controllers/order.ts:516-574` |\n| NFR-5 Cost control | Free-tier aware: TTL-bounded event collection, client-side event batching, one cron job, mock modes for all paid services | `models/ProductEvent.ts:44`; v4 doc ¬ß3.10 \"Mandatory scaling controls\" |\n| NFR-6 Usability | Responsive to mobile widths; skeleton loading; empty states; duplicate-aware actions | PROJECT_AUDIT ¬ß7 |\n\n## 3. User Roles & Permissions Matrix (verified per route file)\n\n| Capability | Guest | Customer | Inventory Manager | Super Admin | Route evidence |\n|---|:-:|:-:|:-:|:-:|---|\n| Browse/search catalog, categories, reviews, recommendations | ‚úî | ‚úî | ‚úî* | ‚úî* | `routes/product.ts:30-32`, `category.ts:8`, `review.ts:14`, `recommendation.ts:7` |\n| Local (guest) cart & wishlist | ‚úî | ‚Äî | ‚Äî | ‚Äî | `utils/guestCart.ts`; `pages/Wishlist.tsx` |\n| Server cart / wishlist / merge | ‚úñ | ‚úî | ‚úî | ‚úî | `routes/cart.ts:9`, `wishlist.ts:9` |\n| Apply coupon (preview) | ‚úñ | ‚úî | ‚úî | ‚úî | `routes/coupon.ts:9-15` |\n| Checkout, own orders, order feedback | ‚úñ | ‚úî | ‚úî | ‚úî | `routes/order.ts:22-28` |\n| Own notifications | ‚úñ | ‚úî | ‚úî | ‚úî | `routes/notification.ts:8-10` |\n| Submit/edit own review (verified purchase) | ‚úñ | ‚úî | ‚úî | ‚úî | `routes/review.ts:20-21` |\n| Product / category CRUD | ‚úñ | ‚úñ | ‚úî | ‚úî | `routes/product.ts:35-50`, `category.ts:11-13` |\n| Coupon CRUD | ‚úñ | ‚úñ | ‚úî | ‚úî | `routes/coupon.ts:18-21` |\n| View all orders + advance status | ‚úñ | ‚úñ | ‚úî | ‚úî | `routes/order.ts:22,31` |\n| Low-stock alerts view/resolve | ‚úñ | ‚úñ | ‚úî | ‚úî | `routes/lowStock.ts:10-11` |\n| Review moderation (list + remove) | ‚úñ | ‚úñ | ‚úî | ‚úî | `routes/review.ts:17,24` |\n| User management (CRUD/role/status) | ‚úñ | ‚úñ | ‚úñ | ‚úî | `routes/user.ts:16` |\n| Audit logs (read-only) | ‚úñ | ‚úñ | ‚úñ | ‚úî | `routes/auditLog.ts:8` |\n| Analytics | ‚úñ | ‚úñ | ‚úñ | ‚úî | `routes/analytics.ts:13` |\n\n\\* Staff can browse APIs, but the UI bounces them to `/admin/dashboard` from any storefront route (`App.tsx:115-129` StaffGate) ‚Äî a deliberate product decision recorded in commit `b9d48b3`.\n\n## 4. Data Model (13 collections as implemented)\n\nERD narrative (relationships verified against `server/src/models/`):\n\n- **users** 1‚ÄîN **orders**, 1‚Äî1 **carts**, 1‚Äî1 **wishlists**, 1‚ÄîN **reviews**, 1‚ÄîN **auditLogs** (actor), 1‚ÄîN **notifications**, 0..N **productEvents** (nullable user).\n- **categories** self-reference via `parentId` (2 levels); 1‚ÄîN **products**.\n- **products** embed `variants[]` and `images[]`; 1‚ÄîN **reviews**, 1‚ÄîN **lowStockAlerts**, 1‚ÄîN **productEvents**, 1‚Äî1 **productRecommendations**; referenced live by cart items, referenced **as snapshots** by order items.\n- **orders** embed snapshot `items[]` + `statusHistory[]` (+optional `refund`, `feedback` subdocs); value-reference **coupons** by code string (human-readable audit trail, not FK).\n- **reviews** carry `orderId` as the verified-purchase proof.\n- **auditLogs** polymorphic target via `targetEntityType` + `targetEntityId`.\n\nIndex inventory (all schema-declared):\n\n| Collection | Indexes |\n|---|---|\n| users | `email` unique |\n| categories | `slug` unique |\n| products | `slug` unique; `categoryId`; text(`name`,`searchKeywords`); compound `(categoryId, basePriceCents)` |\n| carts / wishlists | `userId` unique |\n| orders | `orderNumber` unique; `userId`; `status`; compound `(status, createdAt)` |\n| coupons | `code` unique |\n| reviews | `productId`; **unique `(userId, productId)`** |\n| lowStockAlerts | `productId`; **unique `(productId, variantSku, status)`** *(known defect ‚Äî see FEATURE_INVENTORY ¬ß13)* |\n| auditLogs | `timestamp` *(doc promises actorId/actionType/target too ‚Äî not implemented)* |\n| notifications | `userId`; compound `(userId, createdAt desc)` |\n| productEvents | compound `(userId, eventType, timestamp)`; **TTL `timestamp` 180 d** |\n| productRecommendations | `productId` unique |\n\nDesign-doc lineage: v1 spec (11 collections) ‚Üí v4 (12; adds `productRecommendations`, `costPriceCents`/`unitCostCents`, `statusHistory.updatedBy`; removes a delivery-agent role concept as out-of-BRD-scope ‚Äî stated in the v4 header) ‚Üí implementation adds a 13th (`notifications`) plus email-verification and refresh-grace fields on `users`.\n\n## 5. Sprint Plan ‚Äî **[RECONSTRUCTED ‚Äî Jira CSVs NOT FOUND]**\n\nReconstructed from commit sequence/content (`git log --all`) and doc versioning; boundaries are inferred, not exported:\n\n| Phase | Scope (evidence) | Team focus |\n|---|---|---|\n| **Sprint 0 ‚Äî Planning & foundation** | BRD v1.0 (referenced by the DB docs), DB spec iterations v1‚Üív4, repo bootstrap + hygiene cycles (`47d1f44`, `b1d01b3`, `03f0a6d`, gitignore/`.env` fixes `ba03320`, `21cb44d`) | Mahmod: data model ¬∑ Malik: scaffolding ¬∑ Haya: design tokens |\n| **Sprint 1 ‚Äî Auth core** | Full auth system: register/login/refresh rotation/logout (`ab31544 \"feat: implement full authentication system‚Ä¶\"`) | Malik backend ¬∑ Haya auth pages |\n| **Sprint 2 ‚Äî Commerce core** | Catalog, cart, wishlist, checkout, orders, admin inventory (`1e25f09 \"feat: implement full-stack e-commerce functionality‚Ä¶\"`) | All three, feature-split per FEATURE_INVENTORY presenter column |\n| **Sprint 3 ‚Äî Hardening & operations** | Rate-limiter fix (`c5bf67b`), search/pagination/audit-text fixes (`116d117`), sensitive-file cleanup (`64c6488`) | Malik/Mahmod |\n| **Sprint 4 ‚Äî UX & fulfilment polish (branch `test`, unmerged)** | StaffGate, guest cart + merge, pending-until-confirmed orders, notification system, per-variant images, coupon modal, dashboard tile fixes (`b9d48b3`); pricing/stock fixes (`533e49f`, `fd612b8`) | All three |\n\n**Presentation guidance:** state plainly that the Jira export was not preserved in the repo and this table is a git-derived reconstruction ‚Äî that honesty aligns with the documentation theme of the talk.\n\n## 6. Key Pre-Development Technical Decisions\n\nMade before/at project start (evidenced by the earliest artifacts):\n\n1. **MERN + TypeScript monorepo** ‚Äî npm workspaces from the initial scaffold (`package.json`).\n2. **Document model with explicit embed-vs-reference rules** ‚Äî the v4 doc's decision rule (\"embed when bounded, read-with-parent, not independently queried; reference otherwise\") predates the code and the code follows it.\n3. **Integer cents for all money** ‚Äî `basePriceCents`, `priceDeltaCents`, `unitCostCents` from the first schema version.\n4. **Order-item snapshotting** ‚Äî called \"the single most important modeling decision\" in the v4 doc ¬ß3.6; implemented verbatim.\n5. **Hybrid auth: short-lived JWT + rotating hashed refresh token** ‚Äî present since Sprint 1 (`ab31544`).\n6. **3-role flat RBAC** ‚Äî v4 doc explicitly rejects a permissions collection (\"add only if per-admin custom scopes become a requirement\") and rejects/reverts a 4th delivery-agent role.\n7. **Recommendations precomputed on a schedule, never at request time** ‚Äî v4 doc ¬ß3.10-3.11 defines the productEvents‚Üícache pipeline, TTL, and client-side view batching; all three appear in code (`scheduler.ts`, `ProductEvent.ts:44`, `ProductDetail.tsx:26`).\n8. **Mock-mode-first integrations** ‚Äî Stripe/Cloudinary/mail all designed to run keyless for development and grading demos.\n"},{"id":"future","icon":"üí°","title":"Future Feature","md":"# OptiCart ‚Äî Flagship Future Feature: Smart Energy Advisor\n\n> Store energy-consumption specs per appliance, show customers the **estimated yearly running cost under Lebanese electricity conditions** (EDL tariff + private generator subscription), and let them filter/sort by **total cost of ownership (TCO)** instead of sticker price.\n\n---\n\n## 1. Why this feature (justification)\n\n**(a) Appliances are the product domain ‚Äî energy is the #1 hidden purchase factor.**\nOptiCart sells refrigerators, ovens, washers, microwaves (seed catalog: `server/seed.ts` ‚Äî OptiCool refrigerators, OptiChef ovens/cooktops; categories \"Major/Small Appliances\"). For this category, the purchase price is only the down payment: a refrigerator runs 24/7 for 10+ years. No field in the current model captures that (`models/Product.ts` has price, variants, SEO meta ‚Äî zero energy data), so today two fridges at $899 look identical even if one costs double to run.\n\n**(b) Uniquely valuable in Lebanon.**\nLebanese households pay two electricity bills: the EDL grid tariff and a private **generator (moteur) subscription**, and generator power is dramatically more expensive per kWh than grid power. For an energy-hungry appliance, cumulative generator-era running costs can rival or exceed the appliance's sticker price within a couple of years ‚Äî which makes \"cost to run\" a *decisive* local purchase factor that no regional competitor surfaces. The calculator makes this concrete per product: `yearlyCost = kWhPerYear √ó (gridShare √ó edlTariff + generatorShare √ó generatorTariff)`, with the grid/generator split user-adjustable (hours of state power vary by region). *(Presentation note: quote current EDL and generator per-kWh rates from a dated source at delivery time ‚Äî tariffs change; hardcode them as admin-configurable constants, not literals.)*\n\n**(c) Technically cheap ‚Äî verified against the actual code.**\nThe claim \"extends the existing Product schema and the existing filtering pipeline\" holds, with one honest precision:\n- **Schema:** `ProductSchema` already demonstrates the extension pattern with optional embedded subdocuments ‚Äî `meta: MetaSchema` (`models/Product.ts:65-71,99`). `meta` itself is SEO-focused (title/og tags), so the right move is a **sibling** optional subdoc, not overloading meta:\n  ```ts\n  // models/Product.ts ‚Äî addition\n  export interface IEnergySpec {\n    kWhPerYear?: number;        // standardized yearly consumption\n    energyClass?: string;       // 'A+++'‚Ä¶'D' label for the badge\n    standbyWatts?: number;      // optional, for always-on devices\n  }\n  energySpec: { type: EnergySpecSchema, required: false }\n  ```\n  Optional field ‚áí zero migration: existing documents simply lack it, exactly like products without `brand` today. If consumption differs per variant (capacity variants already exist ‚Äî `IVariant.capacity`, `models/Product.ts:12`), an optional `kWhPerYearDelta` on `VariantSchema` mirrors the existing `priceDeltaCents` pattern.\n- **Filtering/sorting:** `getProducts` builds a filter object and a `sortOption` from query params (`controllers/product.ts:48-112`). Additions are one filter branch (`maxYearlyCost` ‚Üí precomputed `energySpec.estYearlyCostCents: {$lte: ‚Ä¶}`) and one sort branch (`sort === 'tco_asc'` ‚Üí sort by `basePriceCents + N√óestYearlyCostCents`). To keep it index-friendly (matching the existing `(categoryId, basePriceCents)` compound-index strategy, `Product.ts:111`), precompute `estYearlyCostCents` on save (like the slug pre-validate hook, `Product.ts:132-137`) or in the existing nightly cron (`services/scheduler.ts`) when tariffs change, then index it ‚Äî no per-request `$expr` math.\n- **Admin input:** the product form already builds multipart FormData with structured JSON fields (`pages/admin/Products.tsx:269-277`); energy inputs are three more controlled fields in that form.\n- **UI:** one badge + one calculator component on `ProductCard.tsx` / `ProductDetail.tsx` (\"‚âà $X/year to run ¬∑ $Y over 5 years\"), one sort option in the existing dropdown (`ProductList.tsx:336-345`), one filter input in the existing sidebar (`ProductList.tsx:192-297`).\n\n**(d) Defensible differentiator + native upsell path.**\nNo local appliance retailer ranks by cost-of-ownership. And the upsell mechanism already exists: the recommendation system (`services/scheduler.ts` engine + `controllers/recommendation.ts` fallback chain) can be extended with an \"efficient alternative\" rule ‚Äî same category, similar price band, lower `estYearlyCostCents` ‚Äî reusing the `productRecommendations` cache pattern verbatim. \"This fridge costs $120/yr to run ‚Äî this one $55/yr\" is the highest-margin sentence a salesperson can say in Lebanon.\n\n## 2. Concrete implementation path (4 steps, ~small-PR sized each)\n\n| Step | Change | Files touched | Owner |\n|---|---|---|---|\n| 1 | `EnergySpecSchema` + optional `energySpec` on product (+ optional variant delta); pre-save hook computing `estYearlyCostCents` from admin-configurable tariff constants | `server/src/models/Product.ts` | Mahmod |\n| 2 | Filter (`maxYearlyCost`) + sort (`tco_asc`) branches in `getProducts`; accept `energySpec` JSON in create/update (same parse pattern as `variants`) | `server/src/controllers/product.ts:48-112,206-414` | Malik |\n| 3 | Energy fields in the admin product form | `client/src/pages/admin/Products.tsx` | Haya |\n| 4 | Energy badge + yearly/5-year cost calculator (user-adjustable grid/generator hours), TCO sort option, cost filter | `client/src/components/ui/ProductCard.tsx`, `pages/ProductDetail.tsx`, `pages/ProductList.tsx` | Haya |\n| (5, stretch) | \"Energy-efficient alternative\" recommendation rule | `server/src/services/scheduler.ts` | Malik |\n\n## 3. Risks / honest caveats to state if asked\n\n- **Data sourcing:** kWh/year must come from manufacturer spec sheets entered by the inventory manager ‚Äî garbage in, garbage out; mitigate with the `energyClass` label as a low-precision fallback badge.\n- **Tariff volatility:** Lebanese tariffs change; hence admin-configurable constants and a recomputed `estYearlyCostCents`, never hardcoded math in the UI.\n- **Coverage:** the badge/sort only covers products with `energySpec` ‚Äî the optional-field design means the catalog degrades gracefully rather than blocking on backfill.\n\n## 4. One-sentence pitch\n\n\"OptiCart stops selling appliances by their price tag and starts selling them by what they actually cost a Lebanese household ‚Äî a number no competitor shows, computed from fields we can add to our existing schema in an afternoon.\"\n"}];

/* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ Markdown renderer ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
const ESC = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const PIPE = '';

const BADGES = {
  'COMPLETE':'b-ok','FIXED':'b-ok','KNOWN ISSUE':'b-bad','PARTIAL':'b-warn','MISMATCH':'b-warn',
  'NOT FOUND':'b-bad','DOC DRIFT':'b-purple','GIT HYGIENE':'b-gray','STRUCTURE INCONSISTENCY':'b-gray',
  'RECONSTRUCTED ‚Äî Jira CSVs NOT FOUND':'b-purple','KNOWN LIMITATION':'b-gray'
};

function inline(md) {
  let codes = [];
  let s = ESC(md);
  s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '' + (codes.length-1) + ''; });
  s = s.replace(/\[(COMPLETE|FIXED|KNOWN ISSUE|PARTIAL|MISMATCH|NOT FOUND|DOC DRIFT|GIT HYGIENE|STRUCTURE INCONSISTENCY|KNOWN LIMITATION|RECONSTRUCTED ‚Äî Jira CSVs NOT FOUND)([^\]]*)\]/g,
    (m, k, rest) => `<span class="badge ${BADGES[k]||'b-gray'}">${k}${rest}</span>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:]|$)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\\\*/g, '*').replace(/\\\|/g, '|');
  s = s.replace(/(\d+)/g, (m, i) => `<code>${codes[+i]}</code>`);
  return s;
}

function slug(t){ return t.toLowerCase().replace(/<[^>]+>/g,'').replace(/[^a-z0-9√Ä-Ôøø]+/g,'-').replace(/^-|-$/g,'').slice(0,60); }

function renderMd(md, docId) {
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  const out = []; const toc = [];
  let i = 0;
  const isTableSep = l => /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l) && l.includes('-');

  while (i < lines.length) {
    let line = lines[i];

    if (/^```/.test(line)) {                       // fenced code
      let buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++;
      out.push('<pre><code>' + ESC(buf.join('\n')) + '</code></pre>');
      continue;
    }
    if (/^\s*$/.test(line)) { i++; continue; }

    const h = line.match(/^(#{1,6})\s+(.*)/);      // headings
    if (h) {
      const lvl = h[1].length, txt = inline(h[2]);
      const id = docId + '--' + slug(h[2]);
      if (lvl === 2) toc.push({ id, text: h[2].replace(/[*`]/g,'') });
      out.push(`<h${lvl} id="${id}">${txt}</h${lvl}>`);
      i++; continue;
    }
    if (/^\s*(---+|\*\*\*+)\s*$/.test(line)) { out.push('<hr>'); i++; continue; }

    if (/^\s*>/.test(line)) {                      // blockquote
      let buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      out.push('<blockquote>' + buf.map(b => b.trim() ? `<p>${inline(b)}</p>` : '').join('') + '</blockquote>');
      continue;
    }

    if (line.includes('|') && i+1 < lines.length && isTableSep(lines[i+1])) {   // table
      const rows = [];
      const splitRow = l => l.replace(/\\\|/g, PIPE).replace(/^\s*\|/,'').replace(/\|\s*$/,'')
                             .split('|').map(c => c.replace(new RegExp(PIPE,'g'),'\\|').trim());
      const head = splitRow(line); i += 2;
      while (i < lines.length && lines[i].includes('|') && !/^\s*$/.test(lines[i])) { rows.push(splitRow(lines[i])); i++; }
      let t = '<div class="tablewrap"><table><thead><tr>' + head.map(c=>`<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
      for (const r of rows) t += '<tr>' + r.map(c=>`<td>${inline(c)}</td>`).join('') + '</tr>';
      out.push(t + '</tbody></table></div>');
      continue;
    }

    const ul = line.match(/^(\s*)[-*]\s+(.*)/);    // unordered list
    const ol = line.match(/^(\s*)\d+[.)]\s+(.*)/);
    if (ul || ol) {
      const ordered = !!ol;
      const tag = ordered ? 'ol' : 'ul';
      let items = [];
      const re = ordered ? /^(\s*)\d+[.)]\s+(.*)/ : /^(\s*)[-*]\s+(.*)/;
      while (i < lines.length) {
        const m = lines[i].match(re);
        if (!m) break;
        let item = m[2];
        // absorb wrapped continuation lines (indented, not new bullets/blank)
        while (i+1 < lines.length && /^\s{2,}\S/.test(lines[i+1]) && !lines[i+1].match(/^\s*([-*]|\d+[.)])\s/) ) { item += ' ' + lines[++i].trim(); }
        items.push(item); i++;
      }
      out.push(`<${tag}>` + items.map(it => {
        const task = it.match(/^\[( |x)\]\s+(.*)/);
        if (task) return `<li class="task">${task[1]==='x'?'‚úÖ':'‚¨ú'} ${inline(task[2])}</li>`;
        return `<li>${inline(it)}</li>`;
      }).join('') + `</${tag}>`);
      continue;
    }

    let buf = [line]; i++;                          // paragraph
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|```|\s*>|\s*[-*]\s|\s*\d+[.)]\s)/.test(lines[i])
           && !(lines[i].includes('|') && i+1 < lines.length && isTableSep(lines[i+1])) && !/^\s*---+\s*$/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    out.push('<p>' + inline(buf.join(' ')) + '</p>');
  }
  return { html: out.join('\n'), toc };
}

/* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ App shell ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
const nav = document.getElementById('nav');
const docsEl = document.getElementById('docs');
const rendered = DOCS.map(d => ({ ...d, ...renderMd(d.md, d.id) }));

rendered.forEach((d, idx) => {
  const li = document.createElement('li');
  li.id = 'nav-' + d.id;
  li.innerHTML = `<a href="#${d.id}"><span class="icon">${d.icon}</span>${d.title}</a>
    <ul class="subtoc">${d.toc.map(t => `<li><a href="#${t.id}" data-doc="${d.id}">${t.text}</a></li>`).join('')}</ul>`;
  nav.appendChild(li);
  const sec = document.createElement('section');
  sec.className = 'doc'; sec.id = 'doc-' + d.id;
  sec.innerHTML = d.html;
  docsEl.appendChild(sec);
});

function show(id, anchor) {
  const idx = rendered.findIndex(d => d.id === id);
  if (idx < 0) return show(rendered[0].id);
  document.querySelectorAll('.doc').forEach(el => el.classList.remove('visible'));
  document.getElementById('doc-' + id).classList.add('visible');
  document.querySelectorAll('#nav > li').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + id).classList.add('active');
  document.getElementById('crumb').textContent = `Document ${idx} of ${rendered.length - 1} ‚Äî ${rendered[idx].title}`;
  const pager = document.getElementById('pager');
  const prev = rendered[idx-1], next = rendered[idx+1];
  pager.innerHTML =
    (prev ? `<a href="#${prev.id}"><div class="dir">‚Üê Previous</div><div class="ttl">${prev.title}</div></a>` : '<span></span>') +
    (next ? `<a class="next" href="#${next.id}"><div class="dir">Next ‚Üí</div><div class="ttl">${next.title}</div></a>` : '');
  document.getElementById('sidebar').classList.remove('open');
  if (anchor) { requestAnimationFrame(() => { const el = document.getElementById(anchor); if (el) el.scrollIntoView(); }); }
  else window.scrollTo(0, 0);
}
function showAll(){ document.querySelectorAll('.doc').forEach(el => el.classList.add('visible')); }

function route() {
  const h = location.hash.replace(/^#/, '');
  if (!h) return show(rendered[0].id);
  const direct = rendered.find(d => d.id === h);
  if (direct) return show(h);
  const owner = rendered.find(d => h.startsWith(d.id + '--'));
  if (owner) return show(owner.id, h);
  show(rendered[0].id);
}
window.addEventListener('hashchange', route);
route();

const themeBtn = document.getElementById('themeBtn');
function setTheme(t){ document.documentElement.dataset.theme = t; themeBtn.textContent = t === 'dark' ? '‚òÄÔ∏è Light' : 'üåô Dark'; try{localStorage.setItem('oc-theme',t);}catch(e){} }
let saved = null; try{ saved = localStorage.getItem('oc-theme'); }catch(e){}
setTheme(saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.onclick = () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');

/* mobile menu */
document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
</script>
