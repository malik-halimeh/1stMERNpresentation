  /* ‚îÄ‚îÄ Layout ‚îÄ‚îÄ */
  .app { display: flex; min-height: 100vh; }
  aside {

    position: fixed; top: 0; bottom: 0; left: 0; overflow-y: auto; padding: 20px 0 40px;

  .brand p { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .navlist { list-style: none; }
  .navlist > li > a {
    display: flex; align-items: center; gap: 10px; padding: 9px 22px; color: var(--sidebar-text);
    text-decoration: none; font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent; transition: background .15s;
  }

  .navlist > li.active > a { background: rgba(234,88,12,.14); color: #fff; border-left-color: var(--accent); }
  .navlist .icon { width: 20px; text-align: center; flex-shrink: 0; }
  .subtoc { list-style: none; display: none; padding: 2px 0 8px; }
  .navlist > li.active .subtoc { display: block; }
  .subtoc a {
    display: block; padding: 4px 22px 4px 55px; font-size: 12px; color: var(--muted);
    text-decoration: none; line-height: 1.4; border-left: 3px solid transparent;
  }
  .subtoc a:hover { color: #fff; }
  .sidebar-foot { padding: 18px 22px 0; font-size: 11px; color: var(--muted); border-top: 1px solid rgba(255,255,255,.08); margin-top: 16px; }

  /* ‚îÄ‚îÄ Top controls ‚îÄ‚îÄ */
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }

  .toolbar .btns { display: flex; gap: 8px; }
  .tbtn {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-2); font-size: 12.5px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer; box-shadow: var(--shadow);

  .doc em { color: var(--text-2); }

  }

    background: var(--pre-bg); color: var(--pre-text); border-radius: 10px; padding: 18px 20px;
    overflow-x: auto; margin: 14px 0 20px; font-size: 12.8px; line-height: 1.55;

  .doc table { border-collapse: collapse; width: 100%; font-size: 13.3px; }
  .doc th {

    color: var(--text); border-bottom: 2px solid var(--border); white-space: nowrap;

  .doc tr:last-child td { border-bottom: none; }

  .b-warn  { background: rgba(202,138,4,.15);  color: var(--warn); }
  .b-bad   { background: rgba(220,38,38,.13);  color: var(--bad); }
  .b-info  { background: rgba(2,132,199,.13);  color: var(--info); }
  .b-gray  { background: rgba(120,113,108,.15); color: var(--neutral); }
  .b-purple{ background: rgba(124,58,237,.13); color: var(--purple); }

  /* ‚îÄ‚îÄ Prev / Next ‚îÄ‚îÄ */
  .pager { display: flex; justify-content: space-between; gap: 14px; margin-top: 28px; }
  .pager a {
    flex: 1; max-width: 48%; text-decoration: none; border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; padding: 14px 18px; color: var(--text); box-shadow: var(--shadow); transition: border-color .15s;

  .pager a:hover { border-color: var(--accent); }
  .pager .dir { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .pager .ttl { font-size: 14px; font-weight: 600; color: var(--accent-dark); margin-top: 2px; }
  [data-theme="dark"] .pager .ttl { color: var(--accent); }
  .pager a.next { text-align: right; margin-left: auto; }

  .menu-btn { display: none; position: fixed; top: 14px; left: 14px; z-index: 50; }

  @media print {
    aside, .toolbar, .pager, .menu-btn { display: none !important; }
    main { margin: 0; padding: 0; }
    .doc { display: block !important; border: none; box-shadow: none; padding: 0 0 40px; page-break-after: always; }
    body { background: #fff; }
  }
</style>
</head>

onfig*.json`, `eslint.config.js` | Standard Vite/TS/ESLint scaffolding |\n| `a.json` | **Stray committed API response dump** (analytics JSON) ‚Äî no functional role [GIT HYGIENE] |\n| `public/favicon.svg`, `icons.svg` | Static assets |\n\n### client/src ‚Äî core\n\n| File | Responsibility |\n|---|---|\n| `main.tsx` | Root render: `AuthProvider ‚Üí ShopProvider ‚Üí ToastProvider ‚Üí App` under StrictMode |\n| `App.tsx` (276) | All routing: `ProtectedRoute` (auth + role guard with `?redirect=` preservation), `StaffGate` (staff bounced off storefront to `/admin/dashboard`), per-path admin routes wrapped in `AdminContentRoute`, keyed page-transition wrapper, catch-all ‚Üí `/`. `/admin/profile` renders a **title-only stub** [PARTIAL]. No `/reset-password` route (forgot-password link targets it) [KNOWN ISSUE] |\n| `services/api.ts` (92) | Axios instance `withCredentials`; **in-memory access token**; request interceptor attaches Bearer; **single-flight `refreshPromise`**; response interceptor: on 401 (excluding auth endpoints, `_retry` guard) awaits shared refresh then retries; refresh failure ‚Üí redirect to `/login?redirect=‚Ä¶` |\n| `context/AuthContext.tsx` (205) | Session state; mount-time **silent refresh** gated by localStorage `opticart_has_session` hint; `sessionEpochRef` staleness guard (a slow failing refresh can't wipe a newer login); login/register‚Üíverify-email code flow/resend/Google/logout/forgotPassword |\n| `context/ShopContext.tsx` (136) | Shared cart badge count + wishlist id set; guest vs authenticated branching (localStorage vs server); duplicate-aware `addItemToCart`/`addItemToWishlist` |\n| `context/ToastContext.tsx` (50) | Toast queue (success/error/warning/info) |\n| `utils/guestCart.ts` | localStorage guest cart (`guest_cart`): full product snapshots, duplicate ‚Üí 'exists', stock-capped |\n| `utils/guestMerge.ts` | After any sign-in: POST `/cart/merge` + `/wishlist/merge`, then clears local copies |\n| `utils/apiError.ts` | Extracts human-readable message from AppError payload / axios / generic errors |\n\n### client/src/components\n\n| File | Responsibility |\n|---|---|\n| `layout/StorefrontLayout.tsx` (606) | Announcement bar, sticky header, debounced (300 ms) live search suggestions with match highlighting, notification bell, user menu, cart/wishlist badges, **mega-menu** (hover-collapse fixed via 180 ms close timer + `pt-3/-mt-3` hit-area bridge ‚Äî documented in code comments; **but** menu data is hardcoded, subcategory clicks pass display names not slugs ‚Üí empty product list, featured items navigate to fake ids `/products/1`), mobile drawer (**uses raw `\u003ca href=\"/category/‚Ä¶\">` ‚Üí full page reload into a route that doesn't exist** [KNOWN ISSUE]), footer |\n| `layout/AdminLayout.tsx` (267) | Collapsible role-filtered sidebar (Users/AuditLogs/Analytics = super_admin only), mobile drawer, top bar with profile menu + logout |\n| `ui/*` (17 files) | Design-system components: Button, Input, Card, Badge, Modal, Toast, Skeleton, DataTable (303 ‚Äî sortable/paginated table), ColumnChart (SVG chart for analytics), ProductCard (178 ‚Äî price/rating/wishlist/cart actions), NotificationBell (130 ‚Äî poll + unread badge + mark-all-read), SearchBox, Breadcrumb, EmptyState, GoogleSignInButton (GSI script wrapper) |\n\n### client/src/pages ‚Äî storefront\n\n| File | Responsibility |\n|---|---|\n| `Home.tsx` (362) | Hero, category tiles (`/categories`), top-rated + newest products (`inStock=1`), recommendation strip (`/product-recommendations` fallback feed) |\n| `ProductList.tsx` (402) | URL-param-driven catalog: category (real API slugs), price min/max (sanitized ‚â•0), min rating, sort, text search, 12/page pagination, mobile filter drawer, duplicate-aware cart/wishlist toasts |\n| `ProductDetail.tsx` (633) | Product by slug, variant selector, gallery, paginated reviews + verified-review submission, recommendations, **batched view events** (buffer ‚Üí POST `/product-events/batch`) |\n| `Cart.tsx` (462) advance modal with required reason for cancel/refund |\n| `admin/Coupons.tsx` (391) | Coupon list + create modal + activate/deactivate toggle |\n| `admin/LowStock.tsx` (177) | Alert list (status filter) + resolve action |\n| `admin/Reviews.tsx` (178) | Moderation list with text search + soft-remove |\n| `admin/users.tsx` (422) | super_admin user management: search, create/edit (Zod-validated server-side), role change, activate/deactivate, hard delete. **Lowercase filename inconsistent with sibling pages** |\n| `admin/AuditLogs.tsx` (225) | Read-only audit trail (last 100), before/after delta rendering |\n| `admin/Analytics.tsx` (249) | 4 aggregate endpoints ‚Üí KPI cards + ColumnChart series; window selector |\n| `Inventory/Categories.tsx` (351) | Category tree CRUD ‚Äî **lives outside `pages/admin/`** despite being an admin page [STRUCTURE INCONSISTENCY] |\n"},{"id":"fixes","icon":"‚úÖ","title":"Fixes Applied","md":"# OptiCart ‚Äî Fixes Applied (2026-07-11)\n\n> Resolution log for the issues found in SECURITY_REVIEW.md and FEATURE_INVENTORY.md.\n> Two waves: fixes the team shipped themselves (verified, not re-done), then this session's fixes. Every fix was verified by `server/src/test_fixes.ts` (20/20 passing), a TypeScript build of both workspaces, and an HTTP smoke test against the running server.\n\n---\n\n## Wave 1 ‚Äî Fixed by the team (verified in commits `5620779`, `992eaea`, `c7f10b8` + merged `test` branch)\n\n| Issue | Status | How it was fixed |\n|---|---|---|\n| **W5** Password reset dead-end | **[FIXED ‚Äî by team]** | Redesigned as a 6-digit emailed code flow (same pattern as signup verification): `passwordResetCodeHash` + TTL on User, `POST /auth/reset-password` validating email+code+password (`controllers/auth.ts`), full UI step in `ForgotPassword.tsx`. Completing a reset also verifies the email and rotates the refresh token (revokes attacker sessions). |\n| **W3** Coupon limits skipped at checkout | **[FIXED ‚Äî by team]** | `createCheckoutSession` now re-validates every rule `/coupons/apply` enforces ‚Äî existence, active, expiry, min-order, **global usage limit, per-user limit** ‚Äî throwing typed AppErrors instead of silently pricing without the discount (`controllers/order.ts:108-148`). |\n| **W10** Low-stock resolve E11000 on repeat cycles | **[FIXED ‚Äî by team]** | Partial unique index `(productId, variantSku)` filtered to `status:'active'` (`models/LowStockAlert.ts:60-63`) + `LowStockAlert.syncIndexes()` at boot to drop the stale 3-field index (`server.ts`). |\n| Mega-menu hardcoded data / broken links | **[FIXED ‚Äî by team]** | Nav categories now fetched from `GET /categories`; all clicks navigate by **slug** through `goToCategory()`; fake featured items removed (`StorefrontLayout.tsx:16-48,143-198`). |\n| Mobile drawer full-reload `\u003ca>` links | **[FIXED ‚Äî by team]** | Drawer uses the same `goToCategory()`/`navigate()` SPA path; expandable subcategory tree with real data (`StorefrontLayout.tsx:322-376`). |\n| Dashboard tiles truncated at 20 | **[FIXED ‚Äî by team]** | Tiles fetch `?limit=100` with an explanatory comment (`admin/Dashboard.tsx:82-89`). |\n| Scroll position kept across SPA navigations | **[FIXED ‚Äî by team]** | `window.scrollTo(0,0)` on every pathname change (`App.tsx`). |\n\n## Wave 2 ‚Äî Fixed in this session\n\n| Issue | Status | Fix |\n|---|---|---|\n| **W1** Stripe webhook trusted unverified input | **[FIXED]** | `/api/orders/webhook` mounted with `express.raw({type:'application/json'})` **before** `express.json` (`server.ts:30-34`) so `constructEvent` receives the exact bytes; verification now **fails closed** ‚Äî real key + webhook secret ‚áí unsigned/forged payloads get 400 `WEBHOOK_SIGNATURE_MISSING` / `WEBHOOK_SIGNATURE_INVALID` (`controllers/order.ts` stripeWebhook). Mock/dev mode still parses the JSON buffer so the demo MockPaymentForm keeps working. |\n| **W2** Fallback JWT secret (+ latent env-loading bug) | **[FIXED]** | `utils/tokens.ts` resolves the secret **lazily** ‚Äî the old module-load read ran before `dotenv.config()` (ESM import hoisting), meaning tokens were silently signed with the fallback even when `.env` was set. Now: `.env` value honored; production **refuses to boot** without `JWT_ACCESS_SECRET`; dev gets a loud warning + dev-only fallback. |\n| **W9** Stock race / oversell at payment | **[FIXED]** | Webhook decrement is an atomic conditional `$inc` (`stock: {$gte: qty}` in the query) so concurrent payments can't drive stock negative; a lost race clamps to 0 with an explicit oversell warning for staff (`controllers/order.ts` webhook loop). |\n| **W13** \"Refunded\" moved no money | **[FIXED]** | `status ‚Üí refunded` now issues `stripe.refunds.create` (real mode; mock id in mock mode) **before** persisting, populates the `order.refund` subdoc (status/reason/approvedBy/approvedAt/stripeRefundId), and writes the previously-never-used **`refund_decision`** audit entry. A failed Stripe refund aborts the transition (502 `REFUND_FAILED`). |\n| **W4** Rate limiter comment/code mismatch (10 000) | **[FIXED]** | Global limiter set to **1000 req/15 min/IP** with an accurate comment (`middleware/rateLimiter.ts`) ‚Äî generous for normal browsing/classroom NAT, still stops runaway scripts; auth endpoints keep their strict limiter. |\n| **W6** `user.ts` leaked raw error objects | **[FIXED]** | Entire controller rewritten onto the AppError ‚Üí `next(err)` ‚Üí errorHandler pipeline (typed codes: `USER_NOT_FOUND`, `USER_EMAIL_IN_USE`, `USER_SELF_DELETE`, ‚Ä¶). Success response shapes unchanged, so the admin Users page needed no edits. Added missing ObjectId validation on `:id` params. |\n| **W11** Review images accepted as raw URLs | **[FIXED]** | `createReview`/`updateReview` no longer read `images` from the body (stored as `[]`, with a comment explaining why); the client never sent them, so no UI change. |\n| AuditLog promised indexes missing | **[FIXED]** | Added `actorId`, `actionType`, `targetEntityId` indexes matching the GET /audit-logs filters (`models/AuditLog.ts`) ‚Äî doc/code parity restored. |\n| `/admin/profile` title-only stub | **[FIXED]** | Real page at `pages/admin/Profile.tsx`: identity card (avatar/email/role badge), name editing via `PATCH /auth/profile` (updates AuthContext live), and password guidance pointing to the email-code reset flow. Unused `AdminPage`/`AdminRoute` stubs removed from `App.tsx`. |\n| README drift + missing `.env.example` | **[FIXED]** | README: ShopContext (not CartContext), React Router **v7**, real env-var list (only `JWT_ACCESS_SECRET` is read; added `STRIPE_WEBHOOK_SECRET`, `GOOGLE_CLIENT_ID`, mail vars), email section updated for the code flows. Created `server/.env.example` with mock-friendly defaults; `.gitignore` files gained `!.env.example` so it can actually be committed. |\n\n## Deliberately NOT changed (with reasoning)\n\n| Item | Why left as-is |\n|---|---|\n| **W8** Register reveals existing emails (409) | Changing it to a silent \"code sent\" response makes honest signups confusing (\"why no code?\") ‚Äî for a demo storefront the UX cost outweighs the enumeration risk; forgot-password/resend already answer uniformly. State it as a conscious tradeoff if asked. |\n| **W14** Role changes lag up to 15 min (JWT TTL) | Inherent to stateless access tokens; the short TTL is the mitigation. |\n| **W12** View-event spoofing | Bounded by the 50-event batch cap and the (now real) 1000/15 min global limiter; a signed event token is listed as future work. |\n| Hard-delete users | Product decision for the team; soft-delete listed as an improvement in PROJECT_AUDIT. |\n\n## Verification evidence\n\n1. **`server/src/test_fixes.ts` ‚Äî 20/20 passed** (run: `npx tsx src/test_fixes.ts` from `server/`, self-cleaning fixtures):\n   lazy JWT roundtrip ¬∑ low-stock trigger‚Üíresolve√ó2 cycle ¬∑ webhook fail-closed (missing + forged signature) ¬∑ mock webhook E2E over a raw Buffer (stock 5‚Üí2 atomically, coupon `usedBy` counted, cart cleared) ¬∑ webhook replay idempotent ¬∑ oversell guard refuses below-zero ¬∑ exhausted-coupon checkout rejected ¬∑ refund populates `order.refund` + `refund_decision` audit ¬∑ review image URLs dropped ¬∑ `user.ts` bad-id ‚Üí AppError.\n2. **Type safety:** `tsc --noEmit` clean on the server; `npm run build` (tsc -b + vite) clean on the client.\n3. **HTTP smoke (real server, port 5077):** `/api/health` OK ¬∑ `/api/products` 13 items ¬∑ `/api/categories` 2 roots ¬∑ **webhook POST through the actual `express.raw` mount ‚Üí `{received:true}`** ¬∑ unknown route ‚Üí sanitized `ROUTE_NOT_FOUND` envelope ¬∑ `/api/users` without token ‚Üí 401 `AUTH_UNAUTHORIZED`.\n\n> Post-fix status of the SECURITY_REVIEW weakness table: W1 ‚úÖ W2 ‚úÖ W3 ‚úÖ (team) W4 ‚úÖ W5 ‚úÖ (team) W6 ‚úÖ W7 (mitigated by design ‚Äî see review) W8 deliberate W9 ‚úÖ W10 ‚úÖ (team) W11 ‚úÖ W12 accepted W13 ‚úÖ W14 inherent.\n"},{"id":"features","icon":"√¢≈°‚Ñ¢√Ø¬∏¬è","title":"Feature Inventory","md":"# OptiCart ‚Äî Feature Inventory (End-to-End)\n\n> **UPDATE 2026-07-11:** the [PARTIAL]/[KNOWN ISSUE] items below are now resolved ‚Äî password reset (¬ß1), coupon limit bypass (¬ß8), webhook verification (¬ß9), refunds (¬ß10), low-stock index (¬ß13), mega-menu/drawer wiring (¬ß22), admin profile stub (¬ß21). See **FIXES_APPLIED.md** for details and test evidence. Kept as the pre-fix snapshot.\n\n> Status legend: **[COMPLETE]** works end-to-end as implemented ¬∑ **[PARTIAL]** implemented but with a real gap ¬∑ **[KNOWN ISSUE]** verified defect.\n> Presenters: **Haya** (Frontend), **Mahmod** (Database), **Malik** (Backend/Architecture).\n> Every claim carries a file path. Verified against commit `1e25f09`.\n\n---\n\n## 1. Authentication & Session Management ‚Äî [COMPLETE] (one sub-flow PARTIAL)\n\n- **Frontend:** `client/src/pages/Login.tsx`, `Register.tsx`, `ForgotPassword.tsx`, `client/src/context/AuthContext.tsx`, `client/src/services/api.ts`, `client/src/components/ui/GoogleSignInButton.tsx`\n- **API:** POST `/api/auth/register`, `/verify-email`, `/resend-verification`, `/google`, `/login`, `/refresh`, `/logout`, `/forgot-password`; GET/PATCH `/api/auth/profile` (`server/src/routes/auth.ts`)\n- **Controllers:** `register, verifyEmail, resendVerification, googleAuth, login, refresh, logout, forgotPassword, getProfile, updateProfile` (`server/src/controllers/auth.ts`)\n- **Models:** `User`\n- **Presents:** Malik (flow + rotation), Haya (interceptors/silent refresh)\n\nWhat actually works:\n- Register creates an **unverified** account, emails (or console-logs) a 6-digit code (SHA-256-hashed, 15-min TTL, `auth.ts:28-34`); session opens only after `verify-email`. Unverified re-register refreshes the pending account (`auth.ts:87-100`).\n- Login: bcrypt (cost 12) compare, deactivated-account check, unverified ‚Üí fresh code + 403 (`auth.ts:260-304`).\n- Access token = 15-min JWT held **in memory only** (`api.ts:6-11`); refresh token = opaque 40-byte random, SHA-256 hash in DB, `userId:token` in HTTP-only `SameSite=Strict` cookie, 7-day TTL (`auth.ts:18-23,46`).\n- **Rotation + reuse detection:** atomic `findOneAndUpdate` keyed on the old hash so exactly one of N concurrent refreshes rotates (`auth.ts:337-345`); 30-s grace window via `prevRefreshTokenHash` for multi-tab races (`auth.ts:309,366-378`); reuse outside grace revokes everything ‚Üí 403 `AUTH_SESSION_COMPROMISED` (`auth.ts:380-391`).\n- Client: single-flight refresh promise (`api.ts:38-66`), 401 retry interceptor (`api.ts:69-103`), mount-time silent refresh gated by a localStorage session hint, epoch guard so a slow failing refresh can't wipe a fresh login (`AuthContext.tsx:56-122`).\n- Google sign-in: ID token validated against Google's tokeninfo endpoint, `aud` and `email_verified` checked, auto-provisioning with random unusable password (`auth.ts:196-257`).\n\n**[PARTIAL] Password reset:** `forgot-password` generates a 15-min JWT reset link and **logs it to the console** (`auth.ts:459-474`) pointing at `{CLIENT_URL}/reset-password` ‚Äî but there is **no `/reset-password` client route** (`client/src/App.tsx` ‚Äî absent; catch-all at `App.tsx:286` redirects to home) and **no reset endpoint** in `server/src/routes/auth.ts`, even though `ResetPasswordValidator` exists (`server/src/validators/auth.ts:27-37`). The flow dead-ends by design gap, not by intent.\n\n---\n\n## 2. RBAC (3 roles) ‚Äî [COMPLETE]\n\n- **Frontend:** `ProtectedRoute` + `StaffGate` + role-filtered admin sidebar (`client/src/App.tsx:44-129`, `components/layout/AdminLayout.tsx:37-99`)\n- **Backend:** `authenticate` + `authorize(...)` (`server/src/middleware/auth.ts`); every route file declares its roles explicitly\n- **Presents:** Malik\n\nMatrix highlights (verified per route file): storefront commerce (cart/wishlist/checkout/reviews) open to **all three roles**; product/category/coupon/order-status/low-stock/review-moderation = `inventory_manager` + `super_admin`; users/audit-logs/analytics = `super_admin` only. Staff hitting any storefront URL are bounced to `/admin/dashboard` (`App.tsx:115-129`).\n\n---\n\n## 3. Product Catalog & Search ‚Äî [COMPLETE]\n\n- **Frontend:** `ProductList.tsx`, `ProductDetail.tsx`, `Home.tsx`, `ui/ProductCard.tsx`, header live-search in `StorefrontLayout.tsx:127-176`\n- **API:** GET `/api/products` (+filters), GET `/api/products/:slug`, GET `/api/products/by-ids`\n- **Controller:** `getProducts, getProductBySlug, getProductsByIds` (`server/src/controllers/product.ts:42-181`)\n- **Models:** `Product`, `Category`\n- **Presents:** Haya (UI/filters), Mahmod (text index & compound indexes)\n\nFilters: category by id **or slug including one level of children** (`product.ts:59-81`), price in dollars converted to cents, min rating, 4 sort modes, `inStock=1` storefront filter (`$elemMatch stock>0`), MongoDB **text index** search (name + searchKeywords) with textScore sort (`Product.ts:110`, `product.ts:99-104`), pagination capped at 100.\n\n---\n\n## 4. Product Management (Admin) ‚Äî [COMPLETE]\n\n- **Frontend:** `pages/admin/Products.tsx` (multipart FormData: JSON variants + gallery images + per-variant photos via `imageSlot`)\n- **API:** POST/PATCH/DELETE `/api/products*` (manager+admin; Multer memory storage, 5 MB, images‚â§5 / variantImages‚â§20 ‚Äî `routes/product.ts:16-27`)\n- **Controller:** `createProduct, updateProduct, deleteProduct` (`product.ts:206-455`); Cloudinary streaming upload w/ mock mode (`config/cloudinary.ts`)\n- **Models:** `Product`, `Category`, `AuditLog`, `LowStockAlert`, `Order`\n- **Presents:** Haya (form/UX), Malik (upload pipeline)\n\nSafeguards: categoryId validated + existence-checked; price must be a non-negative integer; deletion **blocked** while the product sits in an active order (`product.ts:430-442`); variant/stock updates write a `stock_update` audit entry with before/after variants (`product.ts:392-405`); every save re-checks low-stock thresholds.\n\n---\n\n## 5. Category Tree ‚Äî [COMPLETE]\n\n- **Frontend:** `pages/Inventory/Categories.tsx` (note: located outside `pages/admin/`)\n- **API:** GET (public tree) / POST / PATCH / DELETE `/api/categories`\n- **Controller:** `category.ts` ‚Äî 2-level tree assembly (`category.ts:7-40`), self-parent guard (`:100-102`), delete blocked while children exist (`:139-146`)\n- **Models:** `Category`\n- **Presents:** Mahmod (self-referencing design), Haya (tree UI)\n\n---\n\n## 6. Cart (guest + authenticated) ‚Äî [COMPLETE]\n\n- **Frontend:** `pages/Cart.tsx`, `context/ShopContext.tsx`, `utils/guestCart.ts`, `utils/guestMerge.ts`\n- **API:** GET `/api/cart`, POST `/items`, PATCH/DELETE `/items/:productId`, POST `/merge`\n- **Controller:** `cart.ts`\n- **Models:** `Cart`, `Product`\n- **Presents:** Haya (guest/auth duality), Malik (merge semantics)\n\nNotable: GET revalidates every line against live catalog ‚Äî silently drops deleted products/variants and flags `priceChanged` / `insufficientStock` / `outOfStock` (`cart.ts:24-74`). Duplicate adds return `alreadyInCart` instead of incrementing (`cart.ts:140-153`). Merge-on-login resolves conflicts with `max(quantity)` capped at stock (`cart.ts:304-325`).\n\n---\n\n## 7. Wishlist (guest + authenticated) ‚Äî [COMPLETE]\n\n- **Frontend:** `pages/Wishlist.tsx` (also exports the guest-localStorage helpers), `ShopContext.tsx`\n- **API:** GET `/api/wishlist`, POST `/:productId`, DELETE `/:productId`, POST `/merge`\n- **Controller:** `wishlist.ts` (duplicate-aware add, validated merge)\n- **Models:** `Wishlist`, `Product`\n- **Presents:** Haya\n\n---\n\n## 8. Coupons ‚Äî [COMPLETE] with one enforcement gap\n\n- **Frontend:** apply box in `Cart.tsx:197,230`; management in `admin/Coupons.tsx`\n- **API:** POST `/api/coupons/apply` (rate-limited 20/15 min per user); staff GET/POST/PATCH/DELETE\n- **Controller:** `coupon.ts` ‚Äî apply validates isActive, expiry, min-order, **global usage limit, per-user limit** (`coupon.ts:29-72`); all CUD audited (`coupon_cud`)\n- **Models:** `Coupon`, `AuditLog`\n- **Presents:** Malik\n\n**[KNOWN ISSUE] Limit bypass at checkout:** `createCheckoutSession` re-validates only isActive/expiry/min-order (`order.ts:110-121`) ‚Äî it does **not** check `usageLimit`/`perUserLimit`. A client that skips the `/coupons/apply` preview and sends `couponCode` straight to checkout gets the discount past its limits. Usage counting itself works (webhook increments `usedBy` ‚Äî `order.ts:237-249`).\n\n---\n\n## 9. Checkout & Payments (Stripe) ‚Äî [COMPLETE in mock mode; PARTIAL for production Stripe]\n\n- **Frontend:** `pages/Checkout.tsx` (real `PaymentElement` or MockPaymentForm that itself POSTs the fake webhook ‚Äî `Checkout.tsx:90-120`), `CheckoutRedirect.tsx`, `OrderConfirmation.tsx`\n- **API:** POST `/api/orders/checkout-session`, POST `/api/orders/webhook` (public), GET `/api/orders/status/:paymentIntentId`\n- **Controller:** `order.ts:53-311`\n- **Models:** `Order`, `Cart`, `Product`, `Coupon`, `ProductEvent`, `User`\n- **Presents:** Malik (flow), Mahmod (order snapshot design)\n\nFlow: cart snapshot with live stock validation ‚Üí coupon discount ‚Üí Stripe PaymentIntent (or mock ids) ‚Üí draft `pending` order ‚Üí webhook `payment_intent.succeeded` ‚Üí idempotent (paymentStatus guard) stock decrement, coupon usage, cart clear, purchase `ProductEvent`s, confirmation email. Order **stays `pending` until staff confirms** ‚Äî deliberate two-step design (`order.ts:211-214`).\n\n**[KNOWN ISSUE] Webhook signature verification cannot work in production:** `express.json()` is applied globally (`server.ts:29`) so `req.body` is already parsed when `stripe.webhooks.constructEvent(req.body, sig, secret)` runs (`order.ts:194`) ‚Äî constructEvent requires the **raw** body, so verification always throws and the code **falls back to trusting the unverified parsed body** (`order.ts:195-201`). Works for the mock/demo; not production-safe. (Full analysis in SECURITY_REVIEW.)\n\nAlso noted: `orderNumber` = random 6-digit (`order.ts:150`) ‚Äî unique index protects against silent collision but a collision throws instead of retrying; stock is validated at session creation and decremented only at webhook (no reservation window).\n\n---\n\n## 10. Order Lifecycle & Fulfillment ‚Äî [COMPLETE]\n\n- **Frontend:** `admin/Orders.tsx` (queue, filters, status modal with required reason), `pages/OrderDetail.tsx` (timeline), `AccountDashboard.tsx` (own orders via `?scope=mine`)\n- **API:** GET `/api/orders`, GET `/:id`, PATCH `/:id/status` (staff)\n- **Controller:** `getOrders` (staff-vs-customer scoping + regex order search ‚Äî `order.ts:314-365`), `updateOrderStatus` (`order.ts:460-583`)\n- **Models:** `Order`, `AuditLog`, `Notification`, `User`\n- **Presents:** Malik (state machine), Haya (queue UI)\n\nState machine: `confirmed‚Üíprocessing‚Üíshipped‚Üídelivered`, any‚Üí`cancelled`/`refunded`; terminal states locked (`order.ts:494-497`); cancel/refund require a customer-visible reason (`order.ts:479-486`); every transition appends `statusHistory` with `updatedBy`, writes an `order_status_change` audit entry, creates an in-app notification, and emails the customer.\n\n**[PARTIAL] Refunds:** \"refunded\" is only a status transition. The `IRefund` subdocument (`models/Order.ts:19-25` ‚Äî status/reason/approvedBy/stripeRefundId) is **never populated by any controller**, no Stripe refund API call exists anywhere, and the `refund_decision` audit action (`models/AuditLog.ts:6`) is never written (grep-verified). Money is never actually returned via Stripe.\n\n---\n\n## 11. Order Feedback ‚Äî [COMPLETE]\n\n- **Frontend:** feedback form in `OrderDetail.tsx:113`\n- **API:** POST `/api/orders/:id/feedback`\n- **Controller:** `submitOrderFeedback` (`order.ts:402-456`) ‚Äî owner-only, opens after staff confirmation, rating 1‚Äì5 + text ‚â§2000\n- **Models:** `Order.feedback`\n- **Presents:** Haya\n\n---\n\n## 12. Reviews (verified purchase) ‚Äî [COMPLETE]\n\n- **Frontend:** `ProductDetail.tsx` (list + submit), `OrderDetail.tsx:139` (review from order), `admin/Reviews.tsx` (moderation)\n- **API:** GET `/api/reviews/product/:productId` (public), GET `/api/reviews` (staff), POST, PATCH `/:id`, DELETE `/:id` (staff)\n- **Controller:** `review.ts`\n- **Models:** `Review`, `Order`, `Product`, `AuditLog`\n- **Presents:** Mahmod (transactions + denormalization), Haya (UI)\n\nHighlights: verified purchase = a **delivered** order containing the product (`review.ts:104-116`); one review per user per product enforced by **unique compound index** (`models/Review.ts:81`) plus app check; 30-day edit window (`review.ts:214-218`); moderation is a soft delete (`isRemoved`) + `review_removal` audit; denormalized `ratingAvg`/`reviewCount` recalculated inside a **Mongo transaction with an automatic sequential fallback for standalone servers** (`review.ts:129-175`).\n\n---\n\n## 13. Low-Stock Alerts ‚Äî [COMPLETE] with an index defect\n\n- **Frontend:** `admin/LowStock.tsx`\n- **API:** GET `/api/low-stock`, PATCH `/:id/resolve` (staff)\n- **Controller:** `lowStock.ts`; triggers in `product.ts:13-39` and `order.ts:18-49` (webhook stock decrement also emails all active inventory managers ‚Äî `mailer.ts:92-111`)\n- **Models:** `LowStockAlert`, `AuditLog`\n- **Presents:** Mahmod\n\n**[KNOWN ISSUE] Duplicate-resolved collision:** the unique index is `(productId, variantSku, status)` (`models/LowStockAlert.ts:59`). The comment claims it \"allows multiple 'resolved' alerts\", but a unique index permits only **one** document per key ‚Äî so resolving a *second* alert for the same variant (after an earlier resolved one exists) throws `E11000` and the resolve fails with a 500. Works for first-time resolutions; breaks on the repeat cycle trigger‚Üíresolve‚Üítrigger‚Üíresolve.\n\n---\n\n## 14. Audit Logging ‚Äî [COMPLETE]\n\n- **Frontend:** `admin/AuditLogs.tsx` (before/after delta rendering as text)\n- **API:** GET `/api/audit-logs` (super_admin; actor/type/target/date filters)\n- **Controller:** `auditLog.ts`; writers spread across product/order/coupon/review/user/lowStock controllers\n- **Models:** `AuditLog` ‚Äî **append-only enforced by pre-hooks** that throw on update/delete (`models/AuditLog.ts:78-94`)\n- **Presents:** Mahmod (append-only design), Malik (write sites)\n\n7 of 8 declared action types are written; `refund_decision` never is (see ¬ß10).\n\n---\n\n## 15. Recommendations Engine ‚Äî [COMPLETE]\n\n- **Frontend:** strips in `Home.tsx:108` and `ProductDetail.tsx:167`\n- **API:** GET `/api/product-recommendations` (public, cache-read only)\n- **Controller:** `recommendation.ts` (cache ‚Üí isMostSelling ‚Üí isTrending ‚Üí newest fallback chain)\n- **Scheduler:** `services/scheduler.ts` ‚Äî daily 02:00 cron: co-occurrence over purchase events with recency decay `1/(daysSince+1)`, top-10 per product upserted; plus 7-day trending/most-selling flag updater\n- **Models:** `ProductEvent`, `ProductRecommendation`, `Product`, `Order`\n- **Presents:** Malik (algorithm), Mahmod (TTL + cache design)\n\n---\n\n## 16. Product Event Tracking ‚Äî [COMPLETE] with an attribution limitation\n\n- **Frontend:** view-event buffer in `ProductDetail.tsx:26` (batched POST)\n- **API:** POST `/api/product-events/batch` (public, ‚â§50/batch, validated)\n- **Models:** `ProductEvent` (TTL 180 days)\n- **Presents:** Mahmod\n\n**Limitation (by construction):** the batch route has no `authenticate` middleware, so `req.user` is always undefined and client-sent view events are stored with `userId: null` (`routes/productEvents.ts:34`). Only webhook-written **purchase** events carry a userId ‚Äî which is what the co-occurrence engine actually consumes, so recommendations still work; per-user view history does not exist.\n\n---\n\n## 17. Analytics Dashboard ‚Äî [COMPLETE]\n\n- **Frontend:** `admin/Analytics.tsx` (KPI cards + `ui/ColumnChart.tsx` SVG charts, 7‚Äì365-day window selector)\n- **API:** GET `/api/analytics/revenue|top-skus|order-volume|customer-growth` (super_admin)\n- **Controller:** `analytics.ts` ‚Äî aggregation pipelines; revenue counted from **delivered** orders only; daily buckets, auto-weekly beyond 60 days\n- **Models:** `Order`, `User`\n- **Presents:** Malik\n\n---\n\n## 18. In-App Notifications ‚Äî [COMPLETE]\n\n- **Frontend:** `ui/NotificationBell.tsx` (unread badge, mark-all-read)\n- **API:** GET `/api/notifications`, PATCH `/read-all`\n- **Controller:** `notification.ts`; created on every staff status change (`order.ts:532-559`)\n- **Models:** `Notification`\n- **Presents:** Haya\n\n---\n\n## 19. Email Notifications ‚Äî [COMPLETE as designed (SMTP optional)]\n\n- **Service:** `services/mailer.ts` ‚Äî Gmail app-password or generic SMTP when configured, console stub otherwise; verification codes, order confirmation, status changes (+reason), low-stock alerts to all active managers\n- **Presents:** Malik\n\n---\n\n## 20. User Management (Super Admin) ‚Äî [COMPLETE]\n\n- **Frontend:** `admin/users.tsx`\n- **API:** GET/POST/PUT/DELETE `/api/users*`, PATCH `/:id/role`, PATCH `/:id/status`\n- **Controller:** `user.ts` ‚Äî Zod-validated, sensitive fields stripped, self-role-change/self-deactivate/self-delete blocked, role & status changes + deletes audited. Style note: bypasses the AppError pipeline and its 500 responses include the raw error object (see SECURITY_REVIEW)\n- **Models:** `User`, `AuditLog`\n- **Presents:** Malik\n\n---\n\n## 21. Admin Dashboard ‚Äî [COMPLETE] (contrary to the earlier issue report)\n\n- **Frontend:** `admin/Dashboard.tsx` ‚Äî verified wired to 5 live endpoints (orders total/pending, products total, low-stock actives, active coupons) + recent-orders table\n- **Presents:** Haya\n\nResidual gaps: (a) `/admin/profile` is a **title-only stub** ‚Äî `AdminRoute` renders just a heading (`App.tsx:275-283`); (b) active-alert and active-coupon tiles count only the first 100 fetched documents (`Dashboard.tsx:87-98`).\n\n---\n\n## 22. Storefront Navigation / Mega-Menu ‚Äî status of the three reported issues\n\nVerified against `client/src/components/layout/StorefrontLayout.tsx`:\n\n1. **Mega-menu hover-collapse ‚Äî [FIXED].** 180 ms debounced close timer (`:90-109`) plus `pt-3/-mt-3` hit-area bridge (`:390-392`); both documented in code comments as the fix.\n2. **SPA routing regression ‚Äî [KNOWN ISSUE, confirmed].** The mobile drawer renders raw `\u003ca href=\"/category/‚Ä¶\">` anchors (`:529`) ‚Üí full browser reload into a route that does not exist in `App.tsx` ‚Üí catch-all bounces to home, losing SPA state.\n3. **Mega-menu data wiring ‚Äî [KNOWN ISSUE, confirmed].** `CATEGORIES` is a hardcoded constant (`:18-35`), not fetched from `/api/categories`. Subcategory clicks navigate with the display name (`category=Refrigerators`, `:434`) but the backend matches by **slug** (`controllers/product.ts:64` ‚Üí `Category.findOne({slug})`) so the product list comes back empty; featured items navigate to fabricated ids (`/products/1`, `:457`) ‚Üí PRODUCT_NOT_FOUND view. The sidebar filter in `ProductList.tsx:206-216` does it correctly (real API slugs) ‚Äî the mega-menu was never rewired to match.\n\n---\n\n## Feature ‚Üí Presenter summary\n\n| Presenter | Features |\n|---|---|\n| **Haya** | Catalog UI & filters, Product admin forms, Cart/Wishlist guest duality, Order feedback, Notifications bell, Admin dashboard, Category UI, storefront layout/mega-menu story |\n| **Mahmod** | Data model & indexes, Category tree, Reviews (transactions + denormalization), Low-stock alerts, Audit log append-only design, ProductEvents TTL + recommendation cache |\n| **Malik** | Auth/refresh rotation, RBAC, Checkout/Stripe/webhook, Order state machine, Coupons, Analytics aggregations, Recommendation engine, User management, mailer/scheduler, overall architecture |\n"},{"id":"arch","icon":"üèõ√Ø¬∏¬è","title":"Architecture Report","md":"# OptiCart ‚Äî Architecture Report\n\n> All mechanisms below quote or reference the actual implementation. Commit `1e25f09`.\n\n## 1. Layered Architecture\n\n```\nBrowser (React 19 + TypeScript, Vite)\n  ‚îÇ  pages/ ‚Üí context/ (Auth, Shop, Toast) ‚Üí services/api.ts\n  ‚ñº\nAxios instance (client/src/services/api.ts)\n  ‚îÇ  request interceptor: attach in-memory Bearer token\n  ‚îÇ  response interceptor: 401 ‚Üí single-flight refresh ‚Üí retry\n  ‚ñº\nExpress middleware chain (server/src/server.ts:20-33)\n  helmet ‚Üí cors(CLIENT_URL, credentials) ‚Üí express.json ‚Üí urlencoded\n  ‚Üí cookie-parser ‚Üí morgan ‚Üí apiRateLimiter\n  ‚ñº\nroutes/index.ts (mounts 15 feature routers under /api)\n  ‚ñº\nFeature router (per-route authenticate + authorize(...roles) + endpoint rate limiters + Multer where needed)\n  ‚ñº\nController (server/src/controllers/*.ts ‚Äî validation, business logic, audit writes)\n  ‚ñº\nMongoose models (server/src/models/*.ts ‚Äî schema validation, hooks, indexes)\n  ‚ñº\nMongoDB (13 collections)\n```\n\nSide channels: `services/scheduler.ts` (node-cron) and `services/mailer.ts` (nodemailer) are called from controllers/jobs, not from the request chain.\n\n## 2. Request Lifecycle (concrete example: `GET /api/products?search=fridge`)\n\n1. Page calls `api.get('/products?...')`; request interceptor adds `Authorization: Bearer \u003cmemory token>` if present (`api.ts:23-32`) ‚Äî this endpoint is public so it also works without one.\n2. Express runs the global middleware stack; `apiRateLimiter` counts the request (`server.ts:33`).\n3. `routes/index.ts:30` dispatches to `productRouter`; `routes/product.ts:30` ‚Üí `getProducts`.\n4. Controller builds a filter object (category‚Üíslug/child expansion, price cents conversion, `$text` search), executes `countDocuments` + paged `find` (`controllers/product.ts:42-134`), responds `{success, data, meta:{total,page,limit,pages}}`.\n5. Any thrown error goes to `next(error)` ‚Üí `errorHandler` (`middleware/error.ts`) ‚Üí uniform `{success:false, error:{code,message,details}}`.\n\n## 3. Authentication Flow (complete)\n\n### 3.1 Login\n`POST /auth/login` (`controllers/auth.ts:260-304`): Zod validation ‚Üí user lookup ‚Üí bcrypt compare ‚Üí `isActive` check ‚Üí email-verified check (unverified users get a fresh code and 403) ‚Üí `respondWithSession` (`auth.ts:37-61`):\n- signs a **15-minute JWT access token** (`utils/tokens.ts:12-15`),\n- generates an **opaque refresh token** (`crypto.randomBytes(40)`), stores only its SHA-256 hash on the user, clears the previous-token grace fields,\n- sets cookie `refreshToken = \"\u003cuserId>:\u003ctoken>\"` ‚Äî `httpOnly`, `secure` in production, `sameSite: 'strict'`, 7 days (`auth.ts:18-23`),\n- returns `{accessToken, user}`; the client keeps the access token **in a module variable, never in storage** (`api.ts:6-11`).\n\n### 3.2 Single-flight refresh with rotation + reuse detection\nServer (`controllers/auth.ts:311-395`):\n- Parse `userId:token` from the cookie; hash the token.\n- **Happy path ‚Äî atomic rotation:** `User.findOneAndUpdate({_id, refreshTokenHash: incomingHash}, {new hash, prevRefreshTokenHash: incomingHash, prevRefreshTokenExpiresAt: now+30s})`. Because the hash match is part of the query, of N concurrent refreshes carrying the same token **exactly one** rotates (`auth.ts:337-345`).\n- **Grace path:** if the hash matches `prevRefreshTokenHash` within its 30-s window (`ROTATION_GRACE_MS`, `auth.ts:309`), issue a fresh access token but do **not** rotate again ‚Äî the browser's shared cookie jar already holds the newest refresh token (`auth.ts:363-378`).\n- **Reuse detection:** any other presentation of an old token nulls all refresh hashes, clears the cookie, and returns 403 `AUTH_SESSION_COMPROMISED`, forcing full re-login (`auth.ts:380-391`).\n\nClient (`services/api.ts:34-66`): one shared `refreshPromise` so the mount-time silent refresh, StrictMode double-mount, and any number of concurrent 401 retries all await the **same** rotation ‚Äî a second parallel refresh would itself trip the server's reuse detection.\n\n### 3.3 Silent refresh on mount\n`AuthContext.silentRefresh` (`AuthContext.tsx:59-122`): skipped entirely for guests via a localStorage hint (`opticart_has_session`) to avoid a doomed 401 on every anonymous page load; on success decodes the JWT for id/role, then fetches `/auth/profile` for full identity; a `sessionEpochRef` counter (bumped by login/register/logout) makes stale refresh results no-ops so a slow failing refresh can't wipe a session that a login just established.\n\n### 3.4 401 retry interceptor\n`api.ts:69-103`: on 401 (excluding `/auth/login|register|refresh`, guarded by `_retry`), awaits the shared refresh, replays the original request with the new token; if refresh fails, hard-redirects to `/login?redirect=\u003cpath>`.\n\n### 3.5 RBAC\n`authenticate` verifies the Bearer JWT and populates `req.user {userId, role}`; JWT errors flow to the error handler which maps them to 401 `AUTH_INVALID_TOKEN` / `AUTH_TOKEN_EXPIRED` (`middleware/error.ts:25-32`). `authorize(...allowedRoles)` returns 403 `AUTH_FORBIDDEN` on role mismatch (`middleware/auth.ts:41-53`). Every feature router declares its roles inline (e.g. `routes/user.ts:16` ‚Üí `authorize('super_admin')`).\n\n## 4. Error-Handling Pipeline\n\n- `AppError(code, message, statusCode, details[])` (`utils/errors.ts`) is the domain error type thrown by controllers.\n- `notFound` converts unmatched routes to a 404 AppError (`middleware/error.ts:53-56`).\n- `errorHandler` (`error.ts:4-51`) maps: AppError ‚Üí its own code/status; Mongoose `ValidationError` ‚Üí 400 `DB_VALIDATION_ERROR`; `JsonWebTokenError`/`TokenExpiredError` ‚Üí 401; everything else ‚Üí 500. Response shape is always `{success:false, error:{code,message,details}}`; stack traces are logged only outside production.\n- Client mirror: `utils/apiError.ts` unwraps `error.message` from that envelope for toasts.\n- Exception to the pattern: `controllers/user.ts` responds directly with `res.status(...)` and its catch blocks embed the raw `error` object in 500 responses ‚Äî inconsistent and a minor information-disclosure risk (see SECURITY_REVIEW ¬ßW6).\n\n## 5. Database Connection Resilience\n\n`config/db.ts`: `maxPoolSize: 10`, `autoIndex: true`. Event-driven recovery: on `disconnected`, `handleReconnect` retries up to **5 times at 5-second intervals**, resets the counter on a successful `connected` event, and calls `process.exit(1)` when the budget is exhausted (fail-fast so a supervisor can restart the process). The server only begins listening after the initial `connectDB()` resolves (`server.ts:48-53`).\n\n## 6. Scheduler (node-cron)\n\n`services/scheduler.ts`, registered at startup (`server.ts:51`), one daily job at 02:00 running two passes:\n- **A. Co-occurrence recommendation engine** (`scheduler.ts:30-123`): loads all `purchase` ProductEvents with a userId, groups per user, deduplicates per-product keeping the best recency weight `1/(daysSince+1)`, accumulates pair weights across users, and upserts the **top-10 neighbours per product** into `productRecommendations`. Recommendations are never computed on request ‚Äî `GET /product-recommendations` reads the cache only (`controllers/recommendation.ts`).\n- **B. Trending/most-selling flags** (`scheduler.ts:127-177`): 7-day windows ‚Äî top-8 products by ordered quantity ‚Üí `isMostSelling`; top-8 by view events ‚Üí `isTrending`; flags reset-then-set.\n\n## 7. Mailer\n\n`services/mailer.ts`: transporter built lazily on first send (deliberate ‚Äî dotenv runs after module imports, documented at `mailer.ts:10-12`). Priority: Gmail app-password ‚Üí generic SMTP ‚Üí **console stub**. Four message types: verification code, order confirmation, order status change (with cancellation/refund reason), and low-stock alerts addressed to every active inventory manager (`mailer.ts:92-111`). Sends from controllers are fire-and-forget with `.catch` logging so mail failures never fail the request.\n\n## 8. Stripe Flow\n\n1. **Session:** `POST /orders/checkout-session` (`controllers/order.ts:53-177`) ‚Äî snapshots the cart with live stock checks, computes coupon discount, creates a Stripe PaymentIntent (`stripe.paymentIntents.create({amount, currency:'usd', metadata})`) **or mock ids** when `STRIPE_SECRET_KEY` is absent/`sk_test_mock_key`, then persists a draft order (`status:'pending'`, `paymentStatus:'pending'`, snapshot items including `unitCostCents` for margin math).\n2. **Payment:** real mode renders Stripe `PaymentElement` (`Checkout.tsx:35-88`); mock mode renders `MockPaymentForm` which POSTs a fabricated `payment_intent.succeeded` event to the webhook itself (`Checkout.tsx:101-120`).\n3. **Webhook:** `POST /orders/webhook` (`order.ts:180-286`) ‚Äî verifies the Stripe signature when both secret and header exist, **but falls back to the parsed body if verification throws** (`order.ts:192-201`); since `express.json()` already consumed the raw body (`server.ts:29`), verification can never succeed and the fallback always engages ‚Äî see SECURITY_REVIEW ¬ßW1. On `payment_intent.succeeded` with an idempotency guard (`paymentStatus === 'pending'`): decrement variant stock (floor 0) + low-stock triggers, increment coupon `usedBy`, clear the cart, insert purchase ProductEvents, send confirmation email.\n4. **Confirmation is human:** the order remains `pending` until staff advances it ‚Äî payment success only captures funds (`order.ts:211-214`, surfaced to clients via `GET /orders/status/:paymentIntentId`).\n\n## 9. Cloudinary Flow\n\n`routes/product.ts:16-27`: Multer **memory storage**, 5 MB/file, field limits (`images` ‚â§5, `variantImages` ‚â§20) ‚Äî JSON PATCH requests pass through untouched. Controller streams each buffer through `cloudinary.uploader.upload_stream` (`config/cloudinary.ts:38-53`), stores `{url: secure_url, publicId}`. Variant photos are matched to variants by an `imageSlot` index carried in the variant JSON (`controllers/product.ts:186-203`). Without `CLOUDINARY_URL` the service returns deterministic mock URLs so the whole flow works offline.\n\n## 10. Frontend Architecture Notes\n\n- **State:** Context API only ‚Äî `AuthContext` (session), `ShopContext` (cart badge + wishlist ids with guest/auth branching), `ToastContext`. No Redux/query cache; pages own their fetch state.\n- **Guest commerce:** localStorage cart (`utils/guestCart.ts`, full product snapshots) and wishlist (helpers in `pages/Wishlist.tsx`); `utils/guestMerge.ts` posts both to `/cart/merge` + `/wishlist/merge` after any successful sign-in, then clears local copies. Server merge resolves quantity conflicts with `max(quantity)` capped at stock (`controllers/cart.ts:304-325`).\n- **Routing:** `App.tsx` ‚Äî public storefront, `ProtectedRoute` for customer pages, per-path admin routes (sidebar highlight + no full reloads), `StaffGate` redirecting staff away from the storefront, catch-all ‚Üí home.\n- **Design system:** Tailwind token theme (`tailwind.config.js`) + 17 reusable `ui/` components; icons via lucide-react.\n"},{"id":"tech","icon":"üß∞","title":"Tech Decisions","md":"# OptiCart ‚Äî Technology Decisions\n\n> For each technology: why it fits *this* codebase (with evidence), the main alternatives, the tradeoff, and a one-sentence answer to \"why not X instead?\".\n> Versions from `client/package.json` and `server/package.json`.\n\n---\n\n## Frontend\n\n### React 19\n- **Why:** component model fits a catalog UI built from repeated cards/tables (`client/src/components/ui/` ‚Äî 17 reusable components); Context API covers the app's modest shared state; the team's program is React-centric.\n- **Alternatives:** Vue, Angular, Svelte.\n- **Tradeoff:** more decisions left to the team (routing, state) vs Angular's batteries-included; larger runtime than Svelte.\n- **If asked \"why not Vue/Angular?\":** \"React has the largest ecosystem and hiring pool, and its one-way data flow maps cleanly onto our catalog‚Üícard‚Üíaction component tree ‚Äî Angular's full framework would be overhead for a storefront this size.\"\n\n### Vite 8\n- **Why:** instant dev server + HMR for a 40+-component app; `npm run build` = `tsc -b && vite build` gives type-checking plus optimized bundles (`client/package.json:8`).\n- **Alternatives:** Create React App (deprecated), Next.js, Webpack.\n- **Tradeoff:** no SSR/SEO out of the box ‚Äî product pages are client-rendered even though the Product model carries SEO `meta` fields (`models/Product.ts:21-27`), which only pay off with SSR.\n- **Why not Next.js?:** \"We ship a separate Express API with its own auth/cron/webhook concerns, so Next's server layer would duplicate our backend; Vite gives us the fast SPA toolchain without merging the two.\"\n\n### TypeScript (client ~6.0, server ^5.4)\n- **Why:** shared shape discipline across the stack ‚Äî e.g. the `IUser` role union appears identically in `middleware/auth.ts:9-13` and `AuthContext.tsx:8`; Mongoose generics (`Schema\u003cIProduct>`) catch schema/interface drift at compile time.\n- **Alternatives:** plain JavaScript, JSDoc types.\n- **Tradeoff:** build step + learning curve; some `as any` escape hatches remain (`server.ts:33`, `routes/product.ts:39`).\n- **Why not plain JS?:** \"With 13 collections and 60+ endpoints, the compiler is the only thing that tells us a renamed field broke five files ‚Äî before the demo does.\"\n\n### Tailwind CSS 3.4\n- **Why:** a real token system is defined in `tailwind.config.js` (brand palette, semantic colors, full type scale), so utilities compose a consistent design without a CSS-file-per-component; purge keeps the bundle small.\n- **Alternatives:** CSS Modules, styled-components, MUI/Chakra.\n- **Tradeoff:** long class strings in JSX; discipline needed (the config itself documents a bug where undefined `*-bg` tokens silently rendered transparent ‚Äî `tailwind.config.js:29-34`).\n- **Why not a component library like MUI?:** \"We wanted the OptiCart brand identity, not Material's ‚Äî Tailwind tokens gave us a custom design system at utility-class cost.\"\n\n### React Router 7 (declarative `\u003cRoutes>`)\n- **Why:** SPA navigation with route guards as plain components ‚Äî `ProtectedRoute` and `StaffGate` (`App.tsx:44-129`) express auth/role rules in ~40 lines.\n- **Alternatives:** TanStack Router, file-based routing (Next), hash routing.\n- **Tradeoff:** requires host rewrite-to-index config in production; raw `\u003ca>` tags bypass it ‚Äî which is exactly the mobile-drawer regression (`StorefrontLayout.tsx:529`).\n- **Why not TanStack Router?:** \"React Router is the course-standard, and our guard logic is simple enough that its component model is the clearest expression of it.\"\n\n### Context API (no Redux)\n- **Why:** exactly three shared concerns exist ‚Äî session (`AuthContext`), cart-badge/wishlist ids (`ShopContext`), toasts (`ToastContext`); everything else is page-local fetch state.\n- **Alternatives:** Redux Toolkit, Zustand, TanStack Query.\n- **Tradeoff:** no request caching/deduplication ‚Äî pages refetch on mount; a context value change re-renders all consumers.\n- **Why not Redux?:** \"Redux earns its boilerplate when many slices of state interact; we have three independent contexts, so Redux would be ceremony without benefit.\"\n\n### Axios (+ interceptors)\n- **Why:** the whole token strategy lives in two interceptors ‚Äî Bearer attachment and the single-flight 401‚Üírefresh‚Üíretry (`services/api.ts:23-103`); `withCredentials` handles the refresh cookie.\n- **Alternatives:** native `fetch`, ky.\n- **Tradeoff:** extra dependency vs fetch.\n- **Why not fetch?:** \"Fetch has no interceptors ‚Äî we'd hand-roll the refresh-retry logic around every call; with Axios it's written once and every request inherits it.\"\n\n---\n\n## Backend\n\n### Express 4\n- **Why:** middleware chain mirrors the security model 1:1 ‚Äî helmet ‚Üí CORS ‚Üí parsers ‚Üí rate limit ‚Üí routers ‚Üí error handler (`server.ts:20-45`); per-route composition (`authenticate, authorize, multer, controller` ‚Äî `routes/product.ts:35-41`) keeps policies visible at the route definition.\n- **Alternatives:** Fastify, NestJS, Koa.\n- **Tradeoff:** no built-in structure/DI (we impose our own routes/controllers/models layering); slower than Fastify in raw benchmarks.\n- **Why not NestJS?:** \"Nest's decorators and DI shine on large teams with many modules; our 15 routers with explicit middleware chains are easier to audit for a security-graded project.\"\n\n### Mongoose 8 + MongoDB\n- **Why:** the domain is document-shaped ‚Äî variants embedded in products, snapshot items embedded in orders, statusHistory as an array (`models/Order.ts`); schema-level integrity where it matters: unique compound indexes (one review per user/product ‚Äî `Review.ts:81`), append-only audit hooks (`AuditLog.ts:78-94`), TTL on events (`ProductEvent.ts:44`), text index for search (`Product.ts:110`).\n- **Alternatives:** PostgreSQL + Prisma/TypeORM, raw MongoDB driver.\n- **Tradeoff:** no DB-enforced foreign keys ‚Äî referential rules live in controllers (e.g. product delete blocked while in active orders, `controllers/product.ts:430-442`); multi-document transactions need a replica set (the code carries a standalone fallback, `controllers/review.ts:153-175`).\n- **Why not PostgreSQL?:** \"Our hot documents (product with variants, order with snapshot items) are read whole in one query; in SQL each would be 3‚Äì4 joins, and we'd lose nothing we actually use since our money math is integer cents, not SQL aggregates.\"\n\n### JWT access token + rotating opaque refresh token\n- **Why:** short-lived (15 min) stateless access tokens keep every API hop cheap; the refresh token is *stateful by design* (SHA-256 hash in the user doc) so sessions are revocable and **reuse is detectable** ‚Äî rotation with a 30-s multi-tab grace window and compromise-triggered global revocation (`controllers/auth.ts:309-391`).\n- **Alternatives:** server sessions (express-session + store), long-lived JWTs, OAuth-only.\n- **Tradeoff:** the most complex code in the app (single-flight client logic exists solely to avoid tripping our own reuse detection ‚Äî `api.ts:34-38`); access tokens can't be revoked mid-lifetime (worst case 15 min).\n- **Why not plain sessions?:** \"Sessions put a DB read on every request and tie us to sticky state; our hybrid keeps requests stateless while the rotating refresh hash gives us the revocation and theft-detection that pure JWTs lack.\"\n\n### bcryptjs (cost 12)\n- **Why:** adaptive, salted hashing (`controllers/auth.ts:79-80`); pure-JS package avoids native build issues on Windows dev machines (the team's environment).\n- **Alternatives:** native `bcrypt`, argon2, scrypt.\n- **Tradeoff:** ~30% slower than native bcrypt; argon2 is the modern OWASP first pick.\n- **Why not argon2?:** \"Argon2 is the stronger KDF on paper, but bcrypt at cost 12 is still OWASP-acceptable and bcryptjs installs everywhere with zero native toolchain ‚Äî a real concern for a three-person student team on mixed machines.\"\n\n### Zod\n- **Why:** declarative request validation with field-level error details fed straight into the AppError envelope (`controllers/auth.ts:66-74`); the update-user validator doubles as a **security allowlist** ‚Äî passwordHash/refreshTokenHash are unreachable, role/isActive excluded so they must go through audited endpoints (`validators/user.ts:34-52`).\n- **Alternatives:** Joi, express-validator, class-validator.\n- **Tradeoff:** only auth and user inputs are Zod-validated; product/coupon/cart controllers validate by hand ‚Äî inconsistent depth.\n- **Why not Joi?:** \"Zod infers the TypeScript type from the schema, so the validator and the type can never drift ‚Äî Joi needs both maintained separately.\"\n\n### Multer 2 (memory storage) + Cloudinary 2\n- **Why:** buffers stream straight to Cloudinary (`upload_stream`, `config/cloudinary.ts:38-53`) ‚Äî no temp files on disk, nothing to clean up; 5 MB and field-count caps at the router (`routes/product.ts:16-27`); CDN delivery + stored `publicId` for future deletion.\n- **Alternatives:** local disk + static serving, S3 presigned uploads.\n- **Tradeoff:** vendor dependency; images transit our server (vs presigned direct upload); memory storage means a burst of parallel 5 MB uploads lives in RAM.\n- **Why not store images locally?:** \"Local files die with the dyno and don't CDN; Cloudinary gives storage, transformation and CDN in one free-tier service, and mock mode keeps dev offline-friendly.\"\n\n### Stripe 15 (PaymentIntents + webhook)\n- **Why:** PCI burden stays with Stripe ‚Äî the card form is Stripe's `PaymentElement`, our server only ever sees a PaymentIntent id; the webhook is the single source of payment truth driving stock/coupon/cart side effects (`controllers/order.ts:180-286`); a mock mode makes the full flow demoable with no keys.\n- **Alternatives:** PayPal, Checkout-hosted page, cash-on-delivery only.\n- **Tradeoff:** webhook correctness is on us ‚Äî and our raw-body handling defect means signature verification currently can't pass (SECURITY_REVIEW ¬ßW1).\n- **Why not PayPal?:** \"Stripe's PaymentIntent + webhook model matches our two-phase design (capture funds, staff confirms fulfilment) and its test tooling is the best in class for a demo.\"\n\n### node-cron 4\n- **Why:** one in-process daily job (02:00) recomputes recommendations and trending flags (`services/scheduler.ts:181-190`) ‚Äî the design rule \"never compute recommendations at request time\" (`routes/index.ts:53`) needs a scheduler, not a queue.\n- **Alternatives:** BullMQ + Redis, OS cron hitting an endpoint, serverless scheduled functions.\n- **Tradeoff:** runs inside the web process ‚Äî multiple instances would double-run it, and a crash at 02:00 skips a day; no retry/backoff.\n- **Why not BullMQ?:** \"A Redis-backed queue is the right answer at scale, but for one idempotent nightly aggregation an in-process cron is zero extra infrastructure.\"\n\n### Helmet 7 & CORS\n- **Why:** one-line secure headers baseline (`server.ts:20`); CORS locked to a single origin from `CLIENT_URL` with `credentials: true` for the refresh cookie, trailing slash defensively stripped because browsers match `Access-Control-Allow-Origin` exactly (`server.ts:21-28` ‚Äî the comment documents a real bug class).\n- **Why not hand-rolled headers?:** \"Helmet encodes years of header best practice we'd otherwise have to track release by release.\"\n\n### express-rate-limit 8\n- **Why:** three scoped limiters (`middleware/rateLimiter.ts`): auth 10 failed/15 min with `skipSuccessfulRequests` (account switching never burns budget), coupon-apply 20/15 min keyed by **userId** (`keyGenerator`, `:34`), plus a global limiter. Deliberate placement: `/refresh` and `/logout` are exempt because interceptors fire them automatically (`routes/auth.ts:19-23`).\n- **Tradeoff:** in-memory store ‚Äî resets on restart, not shared across instances; the global limiter's `max: 10000` contradicts its \"100 per 15 minutes\" comment (`rateLimiter.ts:46-49`).\n- **Why not a WAF/gateway limit?:** \"App-level limiting lets us key by userId and skip successful logins ‚Äî semantics a generic gateway can't express.\"\n\n### npm workspaces monorepo\n- **Why:** one repo, two packages (`package.json:5-8`), root scripts (`dev-client`, `dev-server`, `build-all`, `lint-all`) and one shared Prettier config ‚Äî atomic commits across client+server when an API shape changes.\n- **Alternatives:** two repos, Turborepo/Nx, pnpm workspaces.\n- **Tradeoff:** no task graph/caching (fine at this size); accidental cross-imports are possible (none found).\n- **Why not separate repos?:** \"Every feature here touches both sides ‚Äî one PR that changes the endpoint and the page that calls it beats two coordinated PRs every time.\"\n\n### nodemailer 9\n- **Why:** SMTP-agnostic (Gmail app-password or any host) with a console stub fallback (`services/mailer.ts:14-58`) so email flows are demonstrable without credentials.\n- **Why not SendGrid/Resend SDK?:** \"Nodemailer keeps us provider-neutral ‚Äî swapping providers is an env-var change, not a code change.\"\n\n### Morgan\n- **Why:** dev request logging (`server.ts:32`).\n- **Tradeoff:** `dev` format always on ‚Äî production would want structured logs (see PROJECT_AUDIT).\n"},{"id":"security","icon":"üîê","title":"Security Review","md":"# OptiCart ‚Äî Security Review (honest audit)\n\n> **UPDATE 2026-07-11:** most weaknesses below are now RESOLVED ‚Äî W1, W2, W4, W6, W9, W11, W13 fixed this session; W3, W5, W10 fixed by the team. See **FIXES_APPLIED.md** for the resolution log and test evidence. This document is kept as the pre-fix audit (useful for the \"what we found and how we fixed it\" presentation arc).\n\n> Two lists: what is genuinely done well (with evidence), and real weaknesses found in the code.\n> Weaknesses double as prepared answers to \"what would you improve?\" ‚Äî do not hide them in the presentation; owning them scores better than being caught by them. Commit `1e25f09`.\n\n---\n\n## A. Implemented Well\n\n| # | Control | Evidence |\n|---|---|---|\n| S1 | **Helmet** secure headers on every response | `server.ts:20` |\n| S2 | **CORS origin normalization** ‚Äî single origin from `CLIENT_URL`, trailing slash stripped because browsers match `Access-Control-Allow-Origin` exactly; `credentials: true` scoped to that one origin | `server.ts:21-28` |\n| S3 | **Scoped rate limiting** ‚Äî auth 10 *failed* attempts/15 min (`skipSuccessfulRequests: true` so account switching never burns budget); coupon-apply 20/15 min keyed by **userId** not IP; `/auth/refresh` and `/auth/logout` deliberately exempt because interceptors fire them automatically | `middleware/rateLimiter.ts:7-21,25-43`; `routes/auth.ts:19-33` |\n| S4 | **bcrypt cost 12** for all password writes (register, admin create/update, Google provisioning) | `controllers/auth.ts:79-80,231-235`; `controllers/user.ts:154-155,211-214` |\n| S5 | **JWT verification** with error-type mapping (invalid vs expired ‚Üí distinct 401 codes) | `middleware/auth.ts:27-37`; `middleware/error.ts:25-32` |\n| S6 | **RBAC** enforced server-side on every protected router; client guards are UX only | `middleware/auth.ts:41-53`; e.g. `routes/user.ts:16`, `routes/analytics.ts:13` |\n| S7 | **HTTP-only refresh cookie** ‚Äî `httpOnly`, `secure` in production, **`sameSite: 'strict'`** (also a strong CSRF mitigation for the refresh endpoint), 7-day cap | `controllers/auth.ts:18-23` |\n| S8 | **Refresh-token rotation with reuse revocation** ‚Äî only the SHA-256 hash is stored; atomic `findOneAndUpdate` rotation; 30-s grace for multi-tab races; reuse outside grace revokes the whole session (403 `AUTH_SESSION_COMPROMISED`) | `controllers/auth.ts:309-391`; `utils/tokens.ts:23-30` |\n| S9 | **Access token in memory only** ‚Äî never localStorage/sessionStorage, so XSS can't exfiltrate a persisted token; page reload re-authenticates via the cookie | `services/api.ts:6-11`; `AuthContext.tsx:59-122` |\n| S10 | **Email verification gate** ‚Äî sessions only open after a hashed, 15-min-TTL 6-digit code is confirmed; login re-issues codes for unverified accounts | `controllers/auth.ts:25-34,131-169,291-298` |\n| S11 | **Anti-enumeration responses** ‚Äî forgot-password and resend-verification return the same body whether or not the account exists | `controllers/auth.ts:172-192,447-457` |\n| S12 | **Google ID-token validation** ‚Äî tokeninfo check plus explicit `aud` (client-id) and `email_verified` assertions | `controllers/auth.ts:208-222` |\n| S13 | **Multer limits** ‚Äî 5 MB/file, bounded file counts (images ‚â§5, variantImages ‚â§20), memory storage with no disk writes | `routes/product.ts:16-27` |\n| S14 | **ObjectId validation everywhere** user-supplied ids reach queries (products, cart, orders, reviews, coupons, audit filters, wishlist, refresh-cookie userId) | e.g. `controllers/order.ts:327,376`; `controllers/auth.ts:327` |\n| S15 | **Price/money validation** ‚Äî integer-cents math throughout; non-negative checks on prices; discounts capped at subtotal so totals can't go negative | `controllers/product.ts:271-274`; `controllers/coupon.ts:71-72`; `controllers/order.ts:119-123` |\n| S16 | **Regex injection escaped** for all `$regex` searches (orders, users, reviews) | `utils/escapeRegex.ts`; used at `controllers/order.ts:342`, `user.ts:53`, `review.ts:339` |\n| S17 | **Mass-assignment protection** ‚Äî Zod allowlist for admin user updates; `passwordHash`/`refreshTokenHash` unreachable; role/isActive changes forced through dedicated **audited** endpoints with self-change blocks | `validators/user.ts:34-60`; `controllers/user.ts:298-404` |\n| S18 | **Sensitive-field stripping** on every user read (`-passwordHash -refreshTokenHash -prevRefreshTokenHash ‚Ä¶`) | `controllers/user.ts:14-15,93-94` |\n| S19 | **Append-only audit log** ‚Äî schema pre-hooks throw on any update/delete path; denormalized actorName survives account deletion | `models/AuditLog.ts:78-94` |\n| S20 | **Ownership checks** on order detail/feedback (owner or staff), review edit (owner + 30-day window) | `controllers/order.ts:387-389,429-431`; `controllers/review.ts:209-218` |\n| S21 | **Secrets hygiene (eventually)** ‚Äî `.env` untracked and gitignored; the accidental commit was actively removed (`64c6488 \"Remove sensitive file‚Ä¶\"`) | `.gitignore`; `server/.gitignore` |\n\n---\n\n## B. Real Weaknesses / Gaps (improvement answers)\n\n| # | Weakness | Evidence | Improvement to state |\n|---|---|---|---|\n| **W1** | **Stripe webhook signature verification is structurally broken ‚Üí webhook trusts unverified input.** `express.json()` consumes the raw body globally (`server.ts:29`), but `stripe.webhooks.constructEvent` requires the raw payload ‚Äî so verification always throws, and the code **falls back to trusting `req.body`** (`controllers/order.ts:192-201`). In mock mode the client even posts the webhook itself (`Checkout.tsx:107`). Anyone who can reach `/api/orders/webhook` with a known `paymentIntentId` can mark an order paid, decrement stock and burn coupons. | `server.ts:29`; `order.ts:180-201` | Mount the webhook route with `express.raw({type:'application/json'})` before the JSON parser, and **fail closed** ‚Äî reject when signature verification fails instead of falling back. |\n| **W2** | **Hardcoded fallback JWT secret.** If `JWT_ACCESS_SECRET` is unset the server silently signs with `'fallback_access_secret_key_987654'` ‚Äî anyone reading the public repo could forge tokens against a misconfigured deployment. Same literal duplicated in the reset-token signer. | `utils/tokens.ts:4`; `controllers/auth.ts:462` | Fail fast at boot when required secrets are missing (config validation, e.g. a Zod env schema). |\n| **W3** | **Coupon limits skipped at checkout.** `createCheckoutSession` validates isActive/expiry/min-order but not `usageLimit`/`perUserLimit` ‚Äî sending `couponCode` directly to checkout bypasses both caps that `/coupons/apply` enforces. | `controllers/order.ts:110-121` vs `controllers/coupon.ts:49-59` | Extract one `validateCoupon(user, code, subtotal)` used by both endpoints. |\n| **W4** | **Global rate limiter effectively off.** Comment says \"100 requests per 15 minutes\" but `max: 10000` ‚Äî brute-force pressure on non-auth endpoints is essentially unthrottled (auth endpoints have their own limiter). | `middleware/rateLimiter.ts:46-49` | Restore a realistic global cap; add a store (Redis) if horizontally scaled. |\n| **W5** | **Password reset flow dead-ends.** Reset link is only console-logged and targets `/reset-password`, which exists neither as a client route (`App.tsx`) nor as a server endpoint ‚Äî `ResetPasswordValidator` is dead code. Not exploitable, but a broken account-recovery path is a security-adjacent availability gap. | `controllers/auth.ts:459-474`; `validators/auth.ts:27-37` | Implement `POST /auth/reset-password` verifying the JWT `type:'reset'` claim + client page. |\n| **W6** | **Raw error objects returned to clients.** `controllers/user.ts` catch blocks send `{‚Ä¶, error}` with the raw exception in 500 responses (Mongo errors can include query internals); bypasses the sanitized errorHandler envelope used everywhere else. | `controllers/user.ts:76-81,109-115,177-183,‚Ä¶` | Route all errors through `next(err)`/AppError like the other controllers. |\n| **W7** | **No CSRF token layer.** Mitigated for the refresh cookie by `sameSite: 'strict'` (S7) and by state-changing APIs requiring the Bearer header ‚Äî but the webhook (W1) and any future cookie-authenticated endpoint have no CSRF defense in depth. | `controllers/auth.ts:18-23` | Keep strict same-site; add origin verification on the webhook after fixing W1. |\n| **W8** | **Account enumeration via register.** Register returns 409 `AUTH_EMAIL_IN_USE` for existing verified emails ‚Äî inconsistent with the anti-enumeration stance of forgot-password/resend (S11). Login also distinguishes deactivated accounts (403) from wrong passwords (401). | `controllers/auth.ts:101`; `:284-287` | Accept and send \"verification code sent\" regardless, completing verification only for genuinely new accounts. |\n| **W9** | **Stock race between checkout and payment.** Stock is validated at session creation and decremented only in the webhook; two buyers can both pass validation for the last unit ‚Äî the later webhook clamps at 0 (`Math.max(0, ‚Ä¶)`) and the order still succeeds, silently overselling. | `controllers/order.ts:87-93,223` | Atomic conditional decrement (`findOneAndUpdate` with `stock: {$gte: qty}`) at payment time, refusing/refunding on failure. |\n| **W10** | **Low-stock resolve can 500 on repeat cycles** ‚Äî unique index `(productId, variantSku, status)` permits only one *resolved* doc per variant, so the second resolve throws E11000 (the code comment believes otherwise). Availability bug in an admin security-relevant workflow (inventory oversight). | `models/LowStockAlert.ts:56-59` | Partial unique index filtered to `{status:'active'}` only. |\n| **W11** | **Review images accepted as raw client-supplied URLs** ‚Äî `images` array passes straight from `req.body` into the document with no upload pipeline or URL validation; a malicious client can store arbitrary external URLs rendered to other users. | `controllers/review.ts:85,141` | Either wire review images through the same Multer‚ÜíCloudinary path as products, or drop the field. |\n| **W12** | **View events unauthenticated and spoofable** ‚Äî `/product-events/batch` is public by design (anonymous views), so trending flags (`isTrending`) can be inflated by a trivial script; batch cap of 50 limits but doesn't prevent it. | `routes/productEvents.ts:14-50`; `scheduler.ts:145-152` | Rate-limit per IP, or sign a lightweight session token for event submission. |\n| **W13** | **Refunded ‚âÝ refunded.** Marking an order `refunded` performs no Stripe refund call and never populates `order.refund`; customers are told \"refunded\" by email/notification while no money moves. Business-integrity issue rather than intrusion risk. | `controllers/order.ts:460-583` (absence); `models/Order.ts:19-25` | Implement `stripe.refunds.create` on the refund transition + `refund_decision` audit entry. |\n| **W14** | **JWT payload trusted for role between refreshes.** Role changes/deactivation take effect only when the 15-min access token expires ‚Äî a just-demoted or deactivated staff account keeps admin API access up to 15 minutes. Inherent to stateless JWTs; worth stating as a conscious tradeoff. | `middleware/auth.ts:27-33`; token TTL `utils/tokens.ts:14` | Short TTL already bounds it; optionally check `isActive` on sensitive endpoints. |\n\n---\n\n## C. One-line posture summary (for the presentation)\n\nThe auth core (rotation, reuse detection, in-memory tokens, RBAC, audit trail) is genuinely above student-project standard; the real gaps cluster around **third-party trust boundaries** (Stripe webhook raw body, coupon revalidation, env-secret fallbacks) ‚Äî which is itself the lesson: *the code you write is usually safer than the seams where systems meet.*\n"},{"id":"audit","icon":"üìä","title":"Project Audit","md":"# OptiCart ‚Äî Project Audit (instructor-criteria scoring)\n\n> Each criterion scored /10 with file-path evidence and 2‚Äì3 concrete improvements. Honest scoring: strengths are real, and so are the deductions. Commit `1e25f09` (+ read-only inspection of `origin/test`).\n\n---\n\n## 1. Code Quality ‚Äî 7.5/10\n\n**Evidence for:** consistent controller pattern (try ‚Üí AppError ‚Üí `next`) across 12 of 14 controllers; heavy, *accurate* intent comments at tricky spots (rotation grace `controllers/auth.ts:306-309`, single-flight rationale `services/api.ts:34-38`, CORS trailing-slash note `server.ts:23-25`); shared helpers instead of duplication (`utils/escapeRegex.ts`, `utils/apiError.ts`, `respondWithSession`).\n**Evidence against:** `controllers/user.ts` breaks the error-handling convention entirely (raw `res.status(500).json({error})`); duplicated `checkAndTriggerLowStock` in two controllers (`product.ts:13-39`, `order.ts:18-49`) and duplicated `slugify` in two models; `as any` casts on middleware (`server.ts:33`, `routes/product.ts:39`); comment/code contradiction in the rate limiter (`rateLimiter.ts:46-49`).\n**Improve:** (1) refactor `user.ts` onto the AppError pipeline; (2) extract shared low-stock/slugify helpers; (3) delete or align stale comments (rate-limit numbers, LowStockAlert index note).\n\n## 2. Project Structure ‚Äî 7/10\n\n**Evidence for:** clean npm-workspaces monorepo (`package.json:5-8`); textbook backend layering `config / middleware / models / routes / controllers / services / utils / validators`; frontend split `pages / components(layout|ui) / context / services / utils`.\n**Evidence against:** `pages/Inventory/Categories.tsx` sits outside `pages/admin/`; `admin/users.tsx` lowercase vs sibling PascalCase; guest-wishlist helpers live inside a page file (`pages/Wishlist.tsx`) and are imported by `ShopContext` ‚Äî a utility masquerading as a page export; dev scripts (`test_auth.ts` etc.) mixed into `src/` root; stray artifacts committed (`client/a.json`, `structure.txt`).\n**Improve:** (1) move Categories under `pages/admin/` and normalize file naming; (2) extract guest-wishlist helpers to `utils/`; (3) relocate dev scripts to `server/scripts/` and remove stray files.\n\n## 3. UI/UX Quality ‚Äî 7.5/10\n\n**Evidence for:** real design-token system (`tailwind.config.js` ‚Äî palette, type scale, elevation); 17 reusable ui components incl. DataTable, Skeleton loaders, EmptyState, Toast queue; debounced live search with term highlighting (`StorefrontLayout.tsx:127-176`); duplicate-aware add-to-cart messaging; admin queue with required cancel/refund reasons.\n**Evidence against:** mega-menu content is hardcoded and its links are broken (names-not-slugs, fake featured ids ‚Äî `StorefrontLayout.tsx:18-35,434,457`); mobile drawer anchors cause full reloads to a dead route (`:529`); `/admin/profile` is a title-only stub (`App.tsx:275-283`).\n**Improve:** (1) drive the mega-menu from `/api/categories` with slugs; (2) replace drawer `\u003ca>` with `Link` to `/products?category=\u003cslug>`; (3) implement or remove the profile stub.\n\n## 4. Backend Architecture ‚Äî 8.5/10\n\n**Evidence for:** disciplined middleware chain (`server.ts:20-45`); per-route RBAC composition; uniform error envelope; two-phase payment/fulfilment design (webhook captures, staff confirms ‚Äî `controllers/order.ts:211-214`); async side effects (audit, notification, email) isolated in non-blocking try/catch so they never fail the request (`order.ts:516-574`); cron-precomputed recommendation cache honoring a stated design rule (`routes/index.ts:53`).\n**Evidence against:** webhook raw-body defect undermines the trust boundary (SECURITY_REVIEW W1); in-process cron doesn't survive horizontal scaling; no service layer ‚Äî controllers own all business logic (fine at this size, worth acknowledging).\n**Improve:** (1) `express.raw` for the webhook + fail-closed verification; (2) idempotency keys/queue for side effects; (3) extract coupon validation shared by apply+checkout (W3).\n\n## 5. Database Design ‚Äî 8.5/10\n\n**Evidence for:** the v4 spec (`OptiCart_Database_Structure_v4_full.md`, git HEAD) documents embed-vs-reference reasoning per collection and the code matches it: order items are **snapshots** with `unitCostCents` for margin math (`models/Order.ts:61-90`); unique compound review index (`Review.ts:81`); TTL on productEvents (180 d, `ProductEvent.ts:44`); text + compound product indexes (`Product.ts:110-111`); append-only audit hooks (`AuditLog.ts:78-94`); denormalized ratingAvg/reviewCount updated transactionally with standalone fallback (`controllers/review.ts:129-175`).\n**Evidence against:** LowStockAlert unique-index defect (one resolved doc max per variant ‚Äî `LowStockAlert.ts:59`); `notifications` collection absent from the design doc (doc drift); audit-log filterable fields (actorId, actionType, targetEntityId) are queried but only `timestamp` is indexed (`controllers/auditLog.ts:14-49` vs `models/AuditLog.ts:69`), despite the doc claiming all four indexes.\n**Improve:** (1) partial unique index for active alerts; (2) add the three audit indexes the doc promises; (3) publish a v5 doc including `notifications` (13 collections).\n\n## 6. Security Practices ‚Äî 7.5/10\n\n**Evidence for:** the full \"done well\" list in SECURITY_REVIEW ¬ßA ‚Äî rotation + reuse detection, in-memory access token, strict-same-site HTTP-only cookie, RBAC, Zod allowlists, escaped regex, bcrypt-12, audit immutability.\n**Evidence against:** W1 (webhook trusts unverified body), W2 (fallback JWT secret), W3 (coupon limit bypass), W4 (global limiter at 10 000), W6 (raw error leakage).\n**Improve:** the top three: fail-closed webhook verification, boot-time env validation, unified coupon validation. (Full list: SECURITY_REVIEW ¬ßB.)\n\n## 7. Responsiveness ‚Äî 8/10\n\n**Evidence for:** mobile-first patterns throughout ‚Äî storefront mobile drawer + collapsible categories (`StorefrontLayout.tsx:480-597`), admin sidebar collapse + mobile overlay (`AdminLayout.tsx:200-219`), grid breakpoints on catalog (`ProductList.tsx:368`) and dashboard KPI rows (`Dashboard.tsx:134`), mobile filter slide-in panel (`ProductList.tsx:408-425`), hidden-md search relocated into the drawer.\n**Evidence against:** mobile drawer navigation is the broken-anchor path (¬ß3); wide admin tables rely on `overflow-x-auto` rather than responsive layouts (`Dashboard.tsx:185`).\n**Improve:** (1) fix drawer links; (2) card-style collapse for admin tables on small screens; (3) test the mega-menu's 720 px fixed panel on ~1024 px laptops.\n\n## 8. Functionality Completeness ‚Äî 8/10\n\n**Evidence for:** 20+ features work end-to-end (FEATURE_INVENTORY): full auth incl. Google + email verification, guest+auth cart/wishlist with merge, checkout with mock-or-real Stripe, staff fulfilment state machine, verified-purchase reviews with moderation, coupons, low-stock alerts, audit trail, analytics, notifications, recommendations, seed script with per-role credentials.\n**Evidence again
