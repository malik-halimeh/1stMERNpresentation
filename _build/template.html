<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiCart — Analysis Report</title>
<style>
  :root {
    --bg: #faf9f7; --surface: #ffffff; --sidebar-bg: #1c1917; --sidebar-text: #d6d3d1;
    --sidebar-active: #ea580c; --text: #1c1917; --text-2: #57534e; --muted: #a8a29e;
    --border: #e7e5e4; --accent: #ea580c; --accent-dark: #9a3412;
    --code-bg: #f5f5f4; --code-text: #9a3412; --pre-bg: #1c1917; --pre-text: #e7e5e4;
    --th-bg: #f5f5f4; --row-alt: #fafaf9; --quote-bg: #fff7ed; --quote-border: #ea580c;
    --ok: #16a34a; --warn: #ca8a04; --bad: #dc2626; --info: #0284c7; --neutral: #78716c; --purple: #7c3aed;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  [data-theme="dark"] {
    --bg: #131110; --surface: #1c1917; --sidebar-bg: #0e0c0b; --sidebar-text: #a8a29e;
    --text: #e7e5e4; --text-2: #a8a29e; --muted: #78716c;
    --border: #2c2825; --code-bg: #292524; --code-text: #fdba74; --pre-bg: #0e0c0b; --pre-text: #d6d3d1;
    --th-bg: #292524; --row-alt: #201d1b; --quote-bg: #2a2018; --quote-border: #ea580c;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, "Segoe UI", Roboto, "Inter", sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

  /* ── Layout ── */
  .app { display: flex; min-height: 100vh; }
  aside {
    width: 300px; flex-shrink: 0; background: var(--sidebar-bg); color: var(--sidebar-text);
    position: fixed; top: 0; bottom: 0; left: 0; overflow-y: auto; padding: 20px 0 40px;
    scrollbar-width: thin; z-index: 40; transition: transform .25s ease;
  }
  main { margin-left: 300px; flex: 1; display: flex; justify-content: center; padding: 40px 48px 100px; }
  .content { width: 100%; max-width: 920px; }

  /* ── Sidebar ── */
  .brand { padding: 6px 22px 18px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 14px; }
  .brand h1 { font-size: 19px; color: #fff; letter-spacing: -.02em; }
  .brand h1 span { color: var(--accent); }
  .brand p { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .navlist { list-style: none; }
  .navlist > li > a {
    display: flex; align-items: center; gap: 10px; padding: 9px 22px; color: var(--sidebar-text);
    text-decoration: none; font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent; transition: background .15s;
  }
  .navlist > li > a:hover { background: rgba(255,255,255,.05); color: #fff; }
  .navlist > li.active > a { background: rgba(234,88,12,.14); color: #fff; border-left-color: var(--accent); }
  .navlist .icon { width: 20px; text-align: center; flex-shrink: 0; }
  .subtoc { list-style: none; display: none; padding: 2px 0 8px; }
  .navlist > li.active .subtoc { display: block; }
  .subtoc a {
    display: block; padding: 4px 22px 4px 55px; font-size: 12px; color: var(--muted);
    text-decoration: none; line-height: 1.4; border-left: 3px solid transparent;
  }
  .subtoc a:hover { color: #fff; }
  .sidebar-foot { padding: 18px 22px 0; font-size: 11px; color: var(--muted); border-top: 1px solid rgba(255,255,255,.08); margin-top: 16px; }

  /* ── Top controls ── */
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 26px; }
  .crumb { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  .toolbar .btns { display: flex; gap: 8px; }
  .tbtn {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-2); font-size: 12.5px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer; box-shadow: var(--shadow);
  }
  .tbtn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Document card ── */
  .doc {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 44px 52px 52px; box-shadow: var(--shadow); display: none;
  }
  .doc.visible { display: block; }

  /* ── Markdown typography ── */
  .doc h1 { font-size: 27px; letter-spacing: -.02em; line-height: 1.25; color: var(--text); margin-bottom: 6px;
            padding-bottom: 14px; border-bottom: 2px solid var(--accent); }
  .doc h2 { font-size: 20px; margin: 38px 0 12px; padding-top: 10px; letter-spacing: -.01em; color: var(--text); }
  .doc h2::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); margin-right: 10px; transform: rotate(45deg); }
  .doc h3 { font-size: 16.5px; margin: 28px 0 8px; color: var(--text); }
  .doc h4 { font-size: 14.5px; margin: 22px 0 6px; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
  .doc p { margin: 10px 0; font-size: 14.5px; color: var(--text); }
  .doc ul, .doc ol { margin: 10px 0 14px 24px; font-size: 14.5px; }
  .doc li { margin: 5px 0; }
  .doc li.task { list-style: none; margin-left: -20px; }
  .doc hr { border: none; border-top: 1px dashed var(--border); margin: 30px 0; }
  .doc strong { font-weight: 650; }
  .doc em { color: var(--text-2); }
  .doc blockquote {
    background: var(--quote-bg); border-left: 4px solid var(--quote-border); border-radius: 0 10px 10px 0;
    padding: 12px 18px; margin: 14px 0 20px; font-size: 13.5px; color: var(--text-2);
  }
  .doc blockquote p { margin: 4px 0; font-size: 13.5px; }
  .doc code {
    font-family: "Cascadia Code", Consolas, "SF Mono", monospace; font-size: .86em;
    background: var(--code-bg); color: var(--code-text); padding: 2px 6px; border-radius: 5px; word-break: break-word;
  }
  .doc pre {
    background: var(--pre-bg); color: var(--pre-text); border-radius: 10px; padding: 18px 20px;
    overflow-x: auto; margin: 14px 0 20px; font-size: 12.8px; line-height: 1.55;
  }
  .doc pre code { background: none; color: inherit; padding: 0; font-size: inherit; }

  /* ── Tables ── */
  .tablewrap { overflow-x: auto; margin: 14px 0 22px; border: 1px solid var(--border); border-radius: 10px; }
  .doc table { border-collapse: collapse; width: 100%; font-size: 13.3px; }
  .doc th {
    background: var(--th-bg); text-align: left; padding: 10px 14px; font-weight: 650;
    color: var(--text); border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  .doc td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text); }
  .doc tr:last-child td { border-bottom: none; }
  .doc tbody tr:nth-child(even) { background: var(--row-alt); }

  /* ── Badges ── */
  .badge {
    display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .05em;
    padding: 2px 8px; border-radius: 99px; vertical-align: 1px; white-space: nowrap;
  }
  .b-ok    { background: rgba(22,163,74,.14);  color: var(--ok); }
  .b-warn  { background: rgba(202,138,4,.15);  color: var(--warn); }
  .b-bad   { background: rgba(220,38,38,.13);  color: var(--bad); }
  .b-info  { background: rgba(2,132,199,.13);  color: var(--info); }
  .b-gray  { background: rgba(120,113,108,.15); color: var(--neutral); }
  .b-purple{ background: rgba(124,58,237,.13); color: var(--purple); }

  /* ── Prev / Next ── */
  .pager { display: flex; justify-content: space-between; gap: 14px; margin-top: 28px; }
  .pager a {
    flex: 1; max-width: 48%; text-decoration: none; border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; padding: 14px 18px; color: var(--text); box-shadow: var(--shadow); transition: border-color .15s;
  }
  .pager a:hover { border-color: var(--accent); }
  .pager .dir { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .pager .ttl { font-size: 14px; font-weight: 600; color: var(--accent-dark); margin-top: 2px; }
  [data-theme="dark"] .pager .ttl { color: var(--accent); }
  .pager a.next { text-align: right; margin-left: auto; }

  /* ── Mobile ── */
  .menu-btn { display: none; position: fixed; top: 14px; left: 14px; z-index: 50; }
  @media (max-width: 900px) {
    aside { transform: translateX(-100%); }
    aside.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.35); }
    main { margin-left: 0; padding: 64px 14px 80px; }
    .doc { padding: 26px 20px 34px; }
    .menu-btn { display: block; }
  }

  /* ── Print ── */
  @media print {
    aside, .toolbar, .pager, .menu-btn { display: none !important; }
    main { margin: 0; padding: 0; }
    .doc { display: block !important; border: none; box-shadow: none; padding: 0 0 40px; page-break-after: always; }
    body { background: #fff; }
  }
</style>
</head>
<body>
<button class="tbtn menu-btn" id="menuBtn">☰ Menu</button>
<div class="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>Opti<span>Cart</span> Analysis</h1>
      <p>Source-of-truth report · generated 2026-07-10 · commit 1e25f09</p>
    </div>
    <ul class="navlist" id="nav"></ul>
    <div class="sidebar-foot">
      Haya — Frontend · Mahmod — Database · Malik — Backend &amp; Architecture<br><br>
      Source files: <code style="font-size:10px">presentation/00_ANALYSIS/*.md</code>
    </div>
  </aside>
  <main>
    <div class="content">
      <div class="toolbar">
        <div class="crumb" id="crumb"></div>
        <div class="btns">
          <button class="tbtn" id="themeBtn">🌙 Dark</button>
          <button class="tbtn" onclick="showAll();window.print()">🖨 Print all</button>
        </div>
      </div>
      <div id="docs"></div>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>

<script>
const DOCS = /*__DOCS__*/[];

/* ───────────────────────── Markdown renderer ───────────────────────── */
const ESC = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const PIPE = '';

const BADGES = {
  'COMPLETE':'b-ok','FIXED':'b-ok','KNOWN ISSUE':'b-bad','PARTIAL':'b-warn','MISMATCH':'b-warn',
  'NOT FOUND':'b-bad','DOC DRIFT':'b-purple','GIT HYGIENE':'b-gray','STRUCTURE INCONSISTENCY':'b-gray',
  'RECONSTRUCTED — Jira CSVs NOT FOUND':'b-purple','KNOWN LIMITATION':'b-gray'
};

function inline(md) {
  let codes = [];
  let s = ESC(md);
  s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '' + (codes.length-1) + ''; });
  s = s.replace(/\[(COMPLETE|FIXED|KNOWN ISSUE|PARTIAL|MISMATCH|NOT FOUND|DOC DRIFT|GIT HYGIENE|STRUCTURE INCONSISTENCY|KNOWN LIMITATION|RECONSTRUCTED — Jira CSVs NOT FOUND)([^\]]*)\]/g,
    (m, k, rest) => `<span class="badge ${BADGES[k]||'b-gray'}">${k}${rest}</span>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:]|$)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\\\*/g, '*').replace(/\\\|/g, '|');
  s = s.replace(/(\d+)/g, (m, i) => `<code>${codes[+i]}</code>`);
  return s;
}

function slug(t){ return t.toLowerCase().replace(/<[^>]+>/g,'').replace(/[^a-z0-9À-￿]+/g,'-').replace(/^-|-$/g,'').slice(0,60); }

function renderMd(md, docId) {
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  const out = []; const toc = [];
  let i = 0;
  const isTableSep = l => /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l) && l.includes('-');

  while (i < lines.length) {
    let line = lines[i];

    if (/^```/.test(line)) {                       // fenced code
      let buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++;
      out.push('<pre><code>' + ESC(buf.join('\n')) + '</code></pre>');
      continue;
    }
    if (/^\s*$/.test(line)) { i++; continue; }

    const h = line.match(/^(#{1,6})\s+(.*)/);      // headings
    if (h) {
      const lvl = h[1].length, txt = inline(h[2]);
      const id = docId + '--' + slug(h[2]);
      if (lvl === 2) toc.push({ id, text: h[2].replace(/[*`]/g,'') });
      out.push(`<h${lvl} id="${id}">${txt}</h${lvl}>`);
      i++; continue;
    }
    if (/^\s*(---+|\*\*\*+)\s*$/.test(line)) { out.push('<hr>'); i++; continue; }

    if (/^\s*>/.test(line)) {                      // blockquote
      let buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      out.push('<blockquote>' + buf.map(b => b.trim() ? `<p>${inline(b)}</p>` : '').join('') + '</blockquote>');
      continue;
    }

    if (line.includes('|') && i+1 < lines.length && isTableSep(lines[i+1])) {   // table
      const rows = [];
      const splitRow = l => l.replace(/\\\|/g, PIPE).replace(/^\s*\|/,'').replace(/\|\s*$/,'')
                             .split('|').map(c => c.replace(new RegExp(PIPE,'g'),'\\|').trim());
      const head = splitRow(line); i += 2;
      while (i < lines.length && lines[i].includes('|') && !/^\s*$/.test(lines[i])) { rows.push(splitRow(lines[i])); i++; }
      let t = '<div class="tablewrap"><table><thead><tr>' + head.map(c=>`<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
      for (const r of rows) t += '<tr>' + r.map(c=>`<td>${inline(c)}</td>`).join('') + '</tr>';
      out.push(t + '</tbody></table></div>');
      continue;
    }

    const ul = line.match(/^(\s*)[-*]\s+(.*)/);    // unordered list
    const ol = line.match(/^(\s*)\d+[.)]\s+(.*)/);
    if (ul || ol) {
      const ordered = !!ol;
      const tag = ordered ? 'ol' : 'ul';
      let items = [];
      const re = ordered ? /^(\s*)\d+[.)]\s+(.*)/ : /^(\s*)[-*]\s+(.*)/;
      while (i < lines.length) {
        const m = lines[i].match(re);
        if (!m) break;
        let item = m[2];
        // absorb wrapped continuation lines (indented, not new bullets/blank)
        while (i+1 < lines.length && /^\s{2,}\S/.test(lines[i+1]) && !lines[i+1].match(/^\s*([-*]|\d+[.)])\s/) ) { item += ' ' + lines[++i].trim(); }
        items.push(item); i++;
      }
      out.push(`<${tag}>` + items.map(it => {
        const task = it.match(/^\[( |x)\]\s+(.*)/);
        if (task) return `<li class="task">${task[1]==='x'?'✅':'⬜'} ${inline(task[2])}</li>`;
        return `<li>${inline(it)}</li>`;
      }).join('') + `</${tag}>`);
      continue;
    }

    let buf = [line]; i++;                          // paragraph
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|```|\s*>|\s*[-*]\s|\s*\d+[.)]\s)/.test(lines[i])
           && !(lines[i].includes('|') && i+1 < lines.length && isTableSep(lines[i+1])) && !/^\s*---+\s*$/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    out.push('<p>' + inline(buf.join(' ')) + '</p>');
  }
  return { html: out.join('\n'), toc };
}

/* ───────────────────────── App shell ───────────────────────── */
const nav = document.getElementById('nav');
const docsEl = document.getElementById('docs');
const rendered = DOCS.map(d => ({ ...d, ...renderMd(d.md, d.id) }));

rendered.forEach((d, idx) => {
  const li = document.createElement('li');
  li.id = 'nav-' + d.id;
  li.innerHTML = `<a href="#${d.id}"><span class="icon">${d.icon}</span>${d.title}</a>
    <ul class="subtoc">${d.toc.map(t => `<li><a href="#${t.id}" data-doc="${d.id}">${t.text}</a></li>`).join('')}</ul>`;
  nav.appendChild(li);
  const sec = document.createElement('section');
  sec.className = 'doc'; sec.id = 'doc-' + d.id;
  sec.innerHTML = d.html;
  docsEl.appendChild(sec);
});

function show(id, anchor) {
  const idx = rendered.findIndex(d => d.id === id);
  if (idx < 0) return show(rendered[0].id);
  document.querySelectorAll('.doc').forEach(el => el.classList.remove('visible'));
  document.getElementById('doc-' + id).classList.add('visible');
  document.querySelectorAll('#nav > li').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + id).classList.add('active');
  document.getElementById('crumb').textContent = `Document ${idx} of ${rendered.length - 1} — ${rendered[idx].title}`;
  const pager = document.getElementById('pager');
  const prev = rendered[idx-1], next = rendered[idx+1];
  pager.innerHTML =
    (prev ? `<a href="#${prev.id}"><div class="dir">← Previous</div><div class="ttl">${prev.title}</div></a>` : '<span></span>') +
    (next ? `<a class="next" href="#${next.id}"><div class="dir">Next →</div><div class="ttl">${next.title}</div></a>` : '');
  document.getElementById('sidebar').classList.remove('open');
  if (anchor) { requestAnimationFrame(() => { const el = document.getElementById(anchor); if (el) el.scrollIntoView(); }); }
  else window.scrollTo(0, 0);
}
function showAll(){ document.querySelectorAll('.doc').forEach(el => el.classList.add('visible')); }

function route() {
  const h = location.hash.replace(/^#/, '');
  if (!h) return show(rendered[0].id);
  const direct = rendered.find(d => d.id === h);
  if (direct) return show(h);
  const owner = rendered.find(d => h.startsWith(d.id + '--'));
  if (owner) return show(owner.id, h);
  show(rendered[0].id);
}
window.addEventListener('hashchange', route);
route();

/* theme */
const themeBtn = document.getElementById('themeBtn');
function setTheme(t){ document.documentElement.dataset.theme = t; themeBtn.textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark'; try{localStorage.setItem('oc-theme',t);}catch(e){} }
let saved = null; try{ saved = localStorage.getItem('oc-theme'); }catch(e){}
setTheme(saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.onclick = () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');

/* mobile menu */
document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
</script>
</body>
</html>
